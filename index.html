<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#160409">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="brace.">
<title>brace.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <!-- INTRO: tende vento -->
  <div class="intro-curtains" id="intro">
    <div class="intro-wind">
      <span class="l1"></span><span class="l2"></span><span class="l3"></span><span class="l4"></span>
      <span class="r1"></span><span class="r2"></span><span class="r3"></span><span class="r4"></span>
    </div>
    <div class="intro-curtain left"></div>
    <div class="intro-curtain right"></div>
  </div>

  <!-- GATE LOGIN -->
  <div id="login" style="display:none">
    <div class="candle">🕯️</div>
    <div class="login-kick">il nostro spazio</div>
    <div class="login-title">brace<span class="wm-dot">.</span></div>
    <form id="loginForm" autocomplete="on">
      <input id="email" type="email" placeholder="Email" autocomplete="username" required>
      <input id="password" type="password" placeholder="Password" autocomplete="current-password" required>
      <button class="btn" type="submit">Entra</button>
    </form>
    <div id="loginErr" class="login-err"></div>
  </div>

  <!-- GATE LOCK PIN -->
  <div id="lockgate" class="lockgate" style="display:none">
    <div class="candle">🔥</div>
    <div class="lock-title">brace<span class="wm-dot">.</span></div>
    <div class="lock-sub">Inserisci il codice</div>
    <div class="pin-dots" id="pinDots"></div>
    <div class="pin-pad" id="pinPad"></div>
    <button class="pin-bio" id="pinBio" style="display:none">👆 Sblocca con Face ID / impronta</button>
    <div id="lockErr" class="login-err"></div>
  </div>

  <!-- APP -->
  <div class="wrap" id="app" style="display:none">
    <div class="topbar">
      <div class="brand">brace<span class="wm-dot">.</span></div>
      <div class="topbar-right">
        <button class="me-chip" id="meChip"></button>
      </div>
    </div>
    <div class="viewport" id="viewport">
      <div class="track" id="track">
        <section class="page" id="p-desideri"></section>
        <section class="page" id="p-giochi"></section>
        <section class="page" id="p-calendario"></section>
        <section class="page" id="p-mappa"></section>
        <section class="page" id="p-buoni"></section>
        <section class="page" id="p-galleria"></section>
      </div>
    </div>
    <nav class="nav" id="nav"></nav>
  </div>

  <button class="fab" id="fab" style="display:none">＋</button>

  <script type="module" src="js/app.js"></script>
</body>
</html>
