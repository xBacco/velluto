<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Ruota B · Notte di Vegas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-1: #050306;
    --bg-2: #0e0508;
    --fg:   #f8f0e0;
    --muted:#998877;

    --red-1: #b71527;
    --red-2: #e3273a;
    --black: #0a0a0c;

    --gold-1: #ffe580;
    --gold-2: #f0c040;
    --gold-3: #a07a18;

    --rare:  #ffd75a;
    --ultra: #6a1f7a;
    --ultra-glow: #c44ad8;
  }
  * { box-sizing: border-box; }
  html, body {
    margin:0; padding:0;
    background:
      radial-gradient(ellipse at center, var(--bg-2), var(--bg-1) 70%),
      var(--bg-1);
    color:var(--fg);
    font-family:'Inter', sans-serif;
    min-height:100vh;
  }
  body { padding:32px 16px 80px; }

  header { text-align:center; max-width:560px; margin:0 auto 28px; }
  h1 {
    font-family:'Bebas Neue', sans-serif;
    font-size:48px;
    margin:0;
    letter-spacing:0.08em;
    color:var(--gold-1);
    text-shadow:
      0 0 12px var(--gold-2),
      0 0 24px rgba(240,192,64,0.4),
      0 2px 0 var(--gold-3);
  }
  header .sub {
    font-size:11px;
    color:var(--gold-2);
    margin-top:4px;
    letter-spacing:0.3em;
    text-transform:uppercase;
  }

  .stage { max-width:380px; margin:0 auto; }

  .wheel-wrap {
    position:relative;
    width:340px;
    height:340px;
    margin:0 auto;
  }

  /* Puntatore — freccia vegas con neon */
  .pointer {
    position:absolute;
    top:-12px; left:50%;
    transform:translateX(-50%);
    width:32px; height:42px;
    z-index:10;
  }
  .pointer::before {
    content:'';
    position:absolute; inset:0;
    background:linear-gradient(180deg, var(--gold-1), var(--gold-2) 50%, var(--gold-3));
    clip-path:polygon(50% 100%, 0 0, 100% 0);
    filter:drop-shadow(0 0 8px var(--gold-2)) drop-shadow(0 4px 6px rgba(0,0,0,0.7));
  }
  .pointer::after {
    content:'';
    position:absolute; top:4px; left:50%;
    width:8px; height:14px;
    margin-left:-4px;
    background:rgba(255,255,255,0.6);
    clip-path:polygon(50% 100%, 0 0, 100% 0);
    filter:blur(1px);
  }

  /* Anello nero con bordi oro */
  .ring {
    position:absolute; inset:-2px;
    border-radius:50%;
    background:radial-gradient(circle, transparent calc(50% - 18px),
                                       var(--gold-3) calc(50% - 18px) calc(50% - 14px),
                                       var(--black) calc(50% - 14px) calc(50% - 4px),
                                       var(--gold-2) calc(50% - 4px) calc(50% - 2px),
                                       var(--gold-1) calc(50% - 2px) 50%);
    box-shadow:
      0 0 24px rgba(255,229,128,0.4),
      0 0 0 1px var(--gold-3),
      0 12px 32px rgba(0,0,0,0.8);
    pointer-events:none;
    z-index:2;
  }

  /* Lampadine sull'anello */
  .bulb {
    position:absolute;
    top:50%; left:50%;
    width:8px; height:8px;
    margin:-4px 0 0 -4px;
    border-radius:50%;
    background:radial-gradient(circle, #fff8d0, var(--gold-2) 60%, var(--gold-3));
    box-shadow:
      0 0 6px var(--gold-1),
      0 0 12px rgba(255,229,128,0.6);
    z-index:3;
    pointer-events:none;
    animation:flicker 2s infinite;
  }
  .bulb:nth-child(2n) { animation-delay:0.5s; }
  .bulb:nth-child(3n) { animation-delay:1s; }
  @keyframes flicker {
    0%, 100% { opacity:1; }
    50% { opacity:0.5; }
  }

  /* Ruota */
  .wheel {
    position:absolute; inset:18px;
    border-radius:50%;
    overflow:hidden;
    transition:transform 4.5s cubic-bezier(0.17, 0.67, 0.16, 0.99);
    cursor:pointer;
    box-shadow:
      inset 0 0 0 2px var(--black),
      inset 0 0 24px rgba(0,0,0,0.6);
    z-index:1;
  }
  .wheel.spinning { cursor:not-allowed; }

  .emoji {
    position:absolute;
    top:50%; left:50%;
    width:42px; height:42px;
    margin:-21px 0 0 -21px;
    display:flex; align-items:center; justify-content:center;
    font-size:24px;
    line-height:1;
    pointer-events:none;
    text-shadow:0 1px 3px rgba(0,0,0,0.9);
    font-family:'Segoe UI Emoji','Apple Color Emoji','Noto Color Emoji',sans-serif;
    z-index:5;
  }
  .emoji.rare {
    font-size:17px;
    width:30px; height:30px;
    margin:-15px 0 0 -15px;
    filter:drop-shadow(0 0 8px var(--rare));
  }
  .emoji.ultra {
    font-size:17px;
    width:30px; height:30px;
    margin:-15px 0 0 -15px;
    filter:drop-shadow(0 0 10px var(--ultra-glow));
  }

  /* Hub centrale — stella */
  .hub {
    position:absolute;
    top:50%; left:50%;
    width:58px; height:58px;
    margin:-29px 0 0 -29px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 30%, var(--gold-1) 0%, var(--gold-2) 50%, var(--gold-3) 100%);
    box-shadow:
      0 0 0 3px var(--black),
      0 0 0 5px var(--gold-2),
      0 0 16px rgba(255,229,128,0.6),
      0 4px 12px rgba(0,0,0,0.8);
    z-index:5;
    display:flex; align-items:center; justify-content:center;
    font-size:28px;
    color:var(--black);
  }

  .controls { margin-top:32px; text-align:center; }
  .spin-btn {
    background:linear-gradient(180deg, var(--red-2), var(--red-1));
    border:2px solid var(--gold-2);
    color:var(--gold-1);
    padding:16px 48px;
    border-radius:8px;
    font-family:'Bebas Neue', sans-serif;
    font-size:24px;
    letter-spacing:0.2em;
    cursor:pointer;
    box-shadow:
      0 0 0 1px var(--gold-3),
      0 8px 18px rgba(0,0,0,0.6),
      0 0 24px rgba(227,39,58,0.4),
      inset 0 1px 0 rgba(255,255,255,0.2);
    text-shadow:0 0 8px rgba(255,229,128,0.6);
    transition:transform 0.12s, box-shadow 0.12s;
  }
  .spin-btn:active {
    transform:translateY(2px);
    box-shadow:0 4px 10px rgba(0,0,0,0.6), 0 0 0 1px var(--gold-3);
  }
  .spin-btn:disabled { opacity:0.5; cursor:not-allowed; }

  .result {
    margin-top:24px;
    min-height:96px;
    padding:18px;
    background:linear-gradient(135deg, var(--black), var(--bg-2));
    border:2px solid var(--gold-2);
    border-radius:8px;
    box-shadow:
      0 0 0 1px var(--gold-3),
      0 0 24px rgba(240,192,64,0.2),
      inset 0 1px 0 rgba(255,255,255,0.05);
    text-align:center;
    opacity:0;
    transform:translateY(8px);
    transition:opacity 0.4s, transform 0.4s;
  }
  .result.on { opacity:1; transform:translateY(0); }
  .result .lab {
    font-family:'Bebas Neue', sans-serif;
    font-size:14px;
    letter-spacing:0.3em;
    color:var(--gold-2);
    margin-bottom:8px;
  }
  .result .prize {
    font-family:'Bebas Neue', sans-serif;
    font-size:30px;
    color:var(--gold-1);
    letter-spacing:0.08em;
    text-shadow:0 0 12px rgba(255,229,128,0.5);
  }
  .result .prize .em { font-size:36px; margin-right:10px; vertical-align:middle; }
  .result .sub { font-size:13px; color:var(--muted); margin-top:6px; }
</style>
</head>
<body>

<header>
  <h1>JACKPOT</h1>
  <div class="sub">Stile B · Notte di Vegas</div>
</header>

<div class="stage">
  <div class="wheel-wrap">
    <div class="pointer"></div>
    <div class="ring" id="ring"></div>
    <div class="wheel" id="wheel"></div>
    <div class="hub">★</div>
  </div>

  <div class="controls">
    <button class="spin-btn" id="spin">SPIN</button>
  </div>

  <div class="result" id="result">
    <div class="lab">RISULTATO</div>
    <div class="prize"><span class="em" id="resEm">·</span><span id="resLbl">—</span></div>
    <div class="sub" id="resSub"></div>
  </div>
</div>

<script>
  const SET = [
    { e:'💋', k:'segreto',   l:'Apri un segreto',    sub:'Apri una busta segreta',                     w:1 },
    { e:'🔥', k:'piccante',  l:'Piccante',           sub:'Una proposta piccante da provare stasera',   w:1 },
    { e:'💌', k:'desiderio', l:'Pesca una fantasia', sub:'Dalla bacheca delle cose da provare',        w:1 },
    { e:'🧣', k:'bendare',   l:'Bendare',            sub:'X minuti bendato/a, l\'altro decide',        w:1 },
    { e:'🃏', k:'wild',      l:'Carta wild',         sub:'L\'altro/a decide cosa farti per 24h',       w:1 },
    { e:'💆', k:'massaggio', l:'Massaggio',          sub:'10 minuti, dove preferisce chi ha vinto',    w:1 },
    { e:'✖️', k:'doppio',    l:'Prossimo x2',        sub:'Il prossimo premio vale doppio',             w:0.5, rare:'rare' },
    { e:'📸', k:'polaroid',  l:'Foto osè 24h',       sub:'Inviane una al partner entro 24 ore',        w:1 },
    { e:'🎟️', k:'lampo',    l:'Buono lampo',        sub:'Un buono pescato a sorpresa, vale 24h',      w:1 },
    { e:'👅', k:'orale',     l:'Servizio orale',     sub:'Quando vuole chi ha vinto',                  w:1 },
    { e:'🔁', k:'ancora',    l:'Gira ancora',        sub:'Tiro extra concesso',                        w:1 },
    { e:'⭐', k:'jolly',     l:'Jolly',              sub:'Scegli tu il premio',                        w:1 },
    { e:'💎', k:'jackpot',   l:'Jackpot',            sub:'Uno spicchio a testa: 2 premi totali',       w:0.5, rare:'ultra' },
  ];

  const NORMAL_COLORS = ['var(--red-1)','var(--black)'];
  const COLOR_RARE = 'var(--rare)';
  const COLOR_ULTRA = 'var(--ultra)';

  const wheelEl  = document.getElementById('wheel');
  const ringEl   = document.getElementById('ring');
  const spinBtn  = document.getElementById('spin');
  const resEl    = document.getElementById('result');
  const resEm    = document.getElementById('resEm');
  const resLbl   = document.getElementById('resLbl');
  const resSub   = document.getElementById('resSub');

  const sumW = SET.reduce((s,x)=>s+x.w, 0);
  const degPerUnit = 360 / sumW;
  const slice0 = SET[0].w * degPerUnit;

  function colorsFor(set) {
    let nIdx = 0;
    return set.map(item => {
      if (item.rare === 'rare')  return COLOR_RARE;
      if (item.rare === 'ultra') return COLOR_ULTRA;
      const c = NORMAL_COLORS[nIdx % NORMAL_COLORS.length];
      nIdx++;
      return c;
    });
  }
  const COLORS = colorsFor(SET);

  (function build() {
    const stops = [];
    let acc = 0;
    for (let i = 0; i < SET.length; i++) {
      const slice = SET[i].w * degPerUnit;
      stops.push(`${COLORS[i]} ${acc.toFixed(4)}deg ${(acc+slice).toFixed(4)}deg`);
      acc += slice;
    }
    const startOffset = (-90 - slice0/2).toFixed(4);
    wheelEl.style.background = `conic-gradient(from ${startOffset}deg, ${stops.join(', ')})`;

    // dividers oro brillanti
    acc = 0;
    for (let i = 0; i < SET.length; i++) {
      const slice = SET[i].w * degPerUnit;
      acc += slice;
      const boundaryTop = acc - slice0/2;
      const d = document.createElement('div');
      d.style.cssText = `position:absolute;top:50%;left:50%;width:2.5px;height:160px;background:linear-gradient(180deg,var(--gold-1),var(--gold-2),var(--gold-3));box-shadow:0 0 4px var(--gold-2);transform-origin:top center;transform:translateX(-1.25px) rotate(${(boundaryTop+180).toFixed(4)}deg);pointer-events:none;z-index:3;`;
      wheelEl.appendChild(d);
    }

    // emoji
    const R = 124;
    acc = 0;
    for (let i = 0; i < SET.length; i++) {
      const item = SET[i];
      const slice = item.w * degPerUnit;
      const center = acc + slice/2;
      const angTop = center - slice0/2;
      const rad = (angTop - 90) * Math.PI / 180;
      const x = Math.cos(rad) * R;
      const y = Math.sin(rad) * R;
      const em = document.createElement('div');
      em.className = 'emoji ' + (item.rare || '');
      em.textContent = item.e;
      em.style.transform = `translate(${x}px, ${y}px)`;
      wheelEl.appendChild(em);
      acc += slice;
    }

    // lampadine: 16 sull'anello
    for (let i = 0; i < 16; i++) {
      const ang = (i * 22.5) * Math.PI / 180;
      const r = 178;
      const x = Math.cos(ang - Math.PI/2) * r;
      const y = Math.sin(ang - Math.PI/2) * r;
      const b = document.createElement('div');
      b.className = 'bulb';
      b.style.transform = `translate(${x}px, ${y}px)`;
      ringEl.appendChild(b);
    }
  })();

  let spinning = false;
  let totalRotation = 0;

  function spin() {
    if (spinning) return;
    spinning = true;
    wheelEl.classList.add('spinning');
    spinBtn.disabled = true;
    resEl.classList.remove('on');

    let r = Math.random() * sumW;
    let chosen = 0;
    for (let i = 0; i < SET.length; i++) {
      r -= SET[i].w;
      if (r <= 0) { chosen = i; break; }
    }

    let acc = 0;
    for (let i = 0; i < chosen; i++) acc += SET[i].w * degPerUnit;
    const sliceChosen = SET[chosen].w * degPerUnit;
    const chosenCenterFromTop = acc + sliceChosen/2 - slice0/2;

    const turns = 5 + Math.floor(Math.random()*3);
    const target = turns * 360 + (360 - chosenCenterFromTop);
    totalRotation += target;
    wheelEl.style.transform = `rotate(${totalRotation}deg)`;

    setTimeout(() => {
      spinning = false;
      wheelEl.classList.remove('spinning');
      spinBtn.disabled = false;
      const item = SET[chosen];
      resEm.textContent  = item.e;
      resLbl.textContent = item.l;
      resSub.textContent = item.sub;
      resEl.classList.add('on');
    }, 4700);
  }

  spinBtn.addEventListener('click', spin);
  wheelEl.addEventListener('click', spin);
</script>
</body>
</html>
