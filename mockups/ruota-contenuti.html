<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ruota · contenuti (proposte + buoni a sorpresa)</title>
<style>
:root{
  --bg:#160409; --bg2:#2a0813; --wine:#5c1026; --wine2:#7a1533;
  --gold:#d4a86c; --gold-soft:#e9c98f; --cream:#f3d9b0; --rose:#c2557a;
}
*{box-sizing:border-box;}
body{font-family:Georgia,"Times New Roman",serif;color:var(--cream);min-height:100vh;margin:0;
  background:#0c0306;display:flex;flex-direction:column;align-items:center;gap:12px;padding:22px 14px 70px;}
.intro{font-family:Arial,sans-serif;font-size:13px;color:#caa;text-align:center;max-width:460px;line-height:1.5;}
.intro b{color:var(--gold-soft);}
.tabs{display:flex;gap:8px;margin:4px 0;flex-wrap:wrap;justify-content:center;}
.tabs button{font-family:Arial,sans-serif;font-size:13px;background:rgba(255,255,255,.04);border:1px solid rgba(212,168,108,.3);
  color:var(--gold-soft);padding:9px 15px;border-radius:999px;cursor:pointer;}
.tabs button.on{background:var(--wine);color:#fff;border-color:var(--wine2);}

.phone{width:100%;max-width:390px;border-radius:30px;overflow:hidden;border:1px solid rgba(212,168,108,.25);
  background:radial-gradient(120% 70% at 50% -5%,#3d0a1a 0,transparent 55%),linear-gradient(170deg,var(--bg),var(--bg2));
  box-shadow:0 20px 60px rgba(0,0,0,.6);position:relative;min-height:680px;display:flex;flex-direction:column;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:15px 18px 8px;}
.brand{font-size:13px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);}
.me-chip{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.04);border:1px solid rgba(212,168,108,.3);
  border-radius:999px;padding:5px 11px;color:var(--cream);font-family:Arial,sans-serif;font-size:12px;}
.scr{flex:1;overflow-y:auto;padding:10px 18px 18px;}
.section-k{font-family:Arial,sans-serif;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin:6px 2px 12px;}

/* ---- POP-UP PREMIO (riusa la "proiezione di luce") ---- */
.stage{position:relative;border-radius:18px;border:1px solid rgba(212,168,108,.18);
  background:radial-gradient(120% 80% at 50% 0,#3a0c1c 0,transparent 60%);padding:26px 18px 22px;}
.beam{position:absolute;top:0;left:50%;width:130px;height:120px;transform:translateX(-50%);pointer-events:none;
  background:linear-gradient(180deg,rgba(233,201,143,.45),transparent 80%);filter:blur(8px);}
.prize{position:relative;background:linear-gradient(165deg,rgba(92,16,38,.55),rgba(20,4,9,.65));
  border:1px solid rgba(212,168,108,.4);border-radius:16px;padding:22px 20px 20px;text-align:center;
  box-shadow:0 14px 40px rgba(0,0,0,.55);max-width:330px;margin:0 auto;}
.prize .won{font-family:Arial,sans-serif;font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin:0 0 10px;}
.prize .big{font-size:46px;line-height:1;margin-bottom:8px;}
.prize .name{font-size:18px;color:var(--gold-soft);margin:0 0 12px;}
.prize .body{font-size:17px;line-height:1.5;color:var(--cream);margin:0 auto 18px;max-width:270px;min-height:52px;}
.prize .row{display:flex;gap:9px;justify-content:center;}
.btn{font-family:Arial,sans-serif;font-size:13.5px;border-radius:999px;padding:11px 18px;cursor:pointer;border:1px solid;}
.btn.ghost{background:transparent;border-color:var(--gold);color:var(--gold-soft);}
.btn.solid{background:var(--wine);border-color:var(--wine2);color:#fff;}
.counter{font-family:Arial,sans-serif;font-size:11px;color:#b9908f;text-align:center;margin-top:14px;}

/* ---- CARD BUONO A SORPRESA (stile tab Buoni) ---- */
.coupon{position:relative;display:flex;gap:13px;align-items:flex-start;
  background:linear-gradient(160deg,rgba(92,16,38,.30),rgba(20,4,9,.42));
  border:1px solid rgba(212,168,108,.24);border-radius:14px;padding:14px 15px;margin-bottom:11px;}
.coupon::before{content:"";position:absolute;left:0;top:14px;bottom:14px;width:3px;border-radius:3px;
  background:linear-gradient(var(--gold-soft),var(--gold));}
.coupon .em{font-size:30px;line-height:1;flex:0 0 auto;width:42px;text-align:center;}
.coupon .tt{font-size:16px;color:var(--gold-soft);margin:1px 0 4px;}
.coupon .ds{font-family:Arial,sans-serif;font-size:12.5px;color:#d9b8b8;line-height:1.45;margin:0;}
.coupon .tag{font-family:Arial,sans-serif;font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--gold);margin-top:7px;display:inline-block;opacity:.85;}
.hidden{display:none;}
</style>
</head>
<body>
<p class="intro">Contenuti della Ruota <b>nel loro contesto reale</b>. Approva (o chiedi modifiche) per tono, numero e parole.</p>
<div class="tabs">
  <button id="t1" class="on" onclick="tab(1)">🔥 Proposte piccanti</button>
  <button id="t2" onclick="tab(2)">🎁 Buoni a sorpresa</button>
</div>

<div class="phone">
  <div class="topbar"><span class="brand">Velluto</span><span class="me-chip">💋 Tu</span></div>
  <div class="scr">

    <!-- TAB 1: pop-up premio con la proposta piccante -->
    <div id="pane1">
      <p class="section-k">Hai vinto · 🔥 Proposta piccante</p>
      <div class="stage">
        <div class="beam"></div>
        <div class="prize">
          <p class="won">Hai vinto</p>
          <div class="big">🔥</div>
          <p class="name">Proposta piccante</p>
          <p class="body" id="prop">—</p>
          <div class="row">
            <button class="btn ghost" onclick="nextProp()">Pesca un'altra ↻</button>
            <button class="btn solid">Chiudi</button>
          </div>
        </div>
      </div>
      <p class="counter" id="propcount"></p>
    </div>

    <!-- TAB 2: card buoni a sorpresa stile tab Buoni -->
    <div id="pane2" class="hidden">
      <p class="section-k">Materializzati nei Buoni · pool 🎁</p>
      <div id="coupons"></div>
    </div>

  </div>
</div>

<script>
const PROPOSTE = [
  'Spogliatevi a vicenda, lentamente, senza dire una parola.',
  'Massaggio con l’olio: dieci minuti a testa, niente fretta.',
  'Uno dei due bendato: si lascia guidare solo dal tatto.',
  'Doccia insieme, luci basse.',
  'Chi ha girato detta le regole per i prossimi dieci minuti.',
  'Un bacio lungo un minuto intero — mani dietro la schiena.',
  'Raccontatevi una fantasia che non vi siete mai detti.',
  'Striptease privato: una canzone intera, pubblico di una persona.',
];
const BUONI = [
  { e:'💆', t:'Massaggio completo',   d:'Quindici minuti di massaggio, quando lo riscatti.' },
  { e:'🛁', t:'Bagno caldo preparato', d:'Te lo prepara il partner, candele incluse.' },
  { e:'😈', t:'Un sì garantito',   d:'Una richiesta piccante a tua scelta, senza poter dire di no.' },
  { e:'🎬', t:'Serata, scegli tu',     d:'Film e coccole decisi da te, per una sera.' },
  { e:'💋', t:'Tre voglie express',    d:'Tre piccoli desideri esauditi stasera.' },
  { e:'🍳', t:'Colazione a letto',     d:'Una mattina a tua scelta, te la porta il partner.' },
];

let pi = 0;
function showProp(){
  document.getElementById('prop').textContent = PROPOSTE[pi];
  document.getElementById('propcount').textContent = `proposta ${pi+1} di ${PROPOSTE.length}`;
}
function nextProp(){ pi = (pi+1) % PROPOSTE.length; showProp(); }

function el(tag, cls, txt){
  const n = document.createElement(tag);
  if(cls) n.className = cls;
  if(txt != null) n.textContent = txt;
  return n;
}
function drawCoupons(){
  const box = document.getElementById('coupons');
  while(box.firstChild) box.removeChild(box.firstChild);
  for(const b of BUONI){
    const card = el('div','coupon');
    card.appendChild(el('div','em', b.e));
    const right = el('div');
    right.appendChild(el('div','tt', b.t));
    right.appendChild(el('p','ds', b.d));
    right.appendChild(el('span','tag','regalo · vinto alla ruota'));
    card.appendChild(right);
    box.appendChild(card);
  }
}

function tab(n){
  document.getElementById('t1').classList.toggle('on', n===1);
  document.getElementById('t2').classList.toggle('on', n===2);
  document.getElementById('pane1').classList.toggle('hidden', n!==1);
  document.getElementById('pane2').classList.toggle('hidden', n!==2);
}

showProp(); drawCoupons();
</script>
</body>
</html>
