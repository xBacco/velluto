<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Ruota G · come nell'app, 13 spicchi</title>
<style>
  /* === palette ufficiale, da styles.css === */
  :root {
    --bg:#160409; --bg2:#2a0813;
    --wine:#5c1026; --wine2:#7a1533;
    --gold:#d4a86c; --gold-soft:#e9c98f; --cream:#f3d9b0; --rose:#c2557a;
    --spin: cubic-bezier(.17,.67,.16,.99);
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;
    font-family:Georgia,"Times New Roman",serif;
    color:var(--cream);
    background:
      radial-gradient(120% 70% at 50% -5%, #3d0a1a 0, transparent 55%),
      linear-gradient(170deg,var(--bg),var(--bg2));
    background-attachment:fixed;
    min-height:100vh;
  }
  body{padding:24px 16px 80px;}

  header{text-align:center;max-width:560px;margin:0 auto 18px;}
  h1{
    font-size:14px;letter-spacing:.3em;text-transform:uppercase;
    color:var(--gold);margin:0;font-family:Arial,Helvetica,sans-serif;
  }
  header .sub{
    font-size:11px;color:#9c7f88;margin-top:6px;
    font-family:Arial,Helvetica,sans-serif;letter-spacing:.08em;
  }

  /* === card "I tuoi giri" stile app === */
  .giri-card{
    max-width:340px;margin:14px auto;padding:14px 16px;
    background:linear-gradient(180deg,#2a0813,#1c0610);
    border:1px solid rgba(212,168,108,.4);border-radius:14px;
    display:flex;align-items:center;justify-content:space-between;gap:12px;
  }
  .giri-card .k{font-family:Arial,sans-serif;font-size:11px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--gold);margin:0 0 6px;}
  .giri-card .coins{display:flex;gap:5px;}
  .giri-card .coin{width:11px;height:11px;border-radius:50%;
    background:linear-gradient(180deg,var(--gold-soft),var(--gold));box-shadow:0 0 6px var(--gold);}
  .giri-card .right{font-family:Arial,sans-serif;font-size:12px;color:#cbab9e;}

  /* === ruota (rigorosamente come .wheel-wrap in styles.css) === */
  .wheel-wrap{position:relative;width:300px;height:300px;margin:18px auto 0;}

  .pointer{
    position:absolute;top:-6px;left:50%;transform:translateX(-50%);z-index:7;
    width:0;height:0;
    border-left:14px solid transparent;border-right:14px solid transparent;
    border-top:25px solid var(--gold-soft);
    filter:drop-shadow(0 2px 4px rgba(0,0,0,.7));
  }

  .wheel{
    position:absolute;inset:0;border-radius:50%;border:7px solid var(--gold);z-index:1;
    box-shadow:
      0 0 0 3px #2a0813,
      0 0 0 7px rgba(212,168,108,.35),
      0 16px 46px rgba(0,0,0,.65),
      inset 0 0 36px rgba(0,0,0,.5);
    transition:transform 4.2s var(--spin);
    background:radial-gradient(circle,#7a1533 55%,#5c1026 100%);
    cursor:pointer;
  }
  .wheel.spinning{cursor:not-allowed;}

  /* 13 dividers: gradi decimali ESPLICITI (no calc, memory feedback-css-calc-conic-gradient) */
  /* boundaries cumulative dei 11×30°+2×15° (✖️2 in pos 6, 💎 in pos 12):
     30,60,90,120,150,180,195,225,255,285,315,345
     gradient parte from -15deg per centrare slice 0 sotto al puntatore */
  .wheel::after{
    content:"";position:absolute;inset:0;border-radius:50%;pointer-events:none;z-index:2;
    background:conic-gradient(from -15deg,
      transparent 0 29.7deg,   rgba(233,201,143,.7) 29.7deg 30.3deg,
      transparent 30.3deg 59.7deg,   rgba(233,201,143,.7) 59.7deg 60.3deg,
      transparent 60.3deg 89.7deg,   rgba(233,201,143,.7) 89.7deg 90.3deg,
      transparent 90.3deg 119.7deg,  rgba(233,201,143,.7) 119.7deg 120.3deg,
      transparent 120.3deg 149.7deg, rgba(233,201,143,.7) 149.7deg 150.3deg,
      transparent 150.3deg 179.7deg, rgba(233,201,143,.7) 179.7deg 180.3deg,
      transparent 180.3deg 194.7deg, rgba(233,201,143,.7) 194.7deg 195.3deg,
      transparent 195.3deg 224.7deg, rgba(233,201,143,.7) 224.7deg 225.3deg,
      transparent 225.3deg 254.7deg, rgba(233,201,143,.7) 254.7deg 255.3deg,
      transparent 255.3deg 284.7deg, rgba(233,201,143,.7) 284.7deg 285.3deg,
      transparent 285.3deg 314.7deg, rgba(233,201,143,.7) 314.7deg 315.3deg,
      transparent 315.3deg 344.7deg, rgba(233,201,143,.7) 344.7deg 345.3deg,
      transparent 345.3deg 360deg);
  }

  /* spotlight sullo spicchio vincente — width impostata via JS dopo lo spin */
  .winhi{
    position:absolute;inset:0;border-radius:50%;z-index:3;pointer-events:none;opacity:0;
    transition:opacity .3s;
    background:conic-gradient(from -15deg,
      transparent 0 30deg,
      rgba(8,2,5,.74) 30deg 360deg);
  }
  .winhi.on{opacity:1;}

  /* emoji centrate sullo spicchio, raggio 98 (come l'app) */
  .slice-lbl{position:absolute;inset:0;pointer-events:none;z-index:4;}
  .slice-lbl .in{
    position:absolute;top:50%;left:50%;width:0;height:0;
    transform-origin:0 0;
  }
  .slice-lbl .e{
    position:absolute;
    width:40px;height:40px;
    margin:-20px 0 0 -20px;
    display:flex;align-items:center;justify-content:center;
    font-size:24px;line-height:1;
    font-family:'Segoe UI Emoji','Apple Color Emoji','Noto Color Emoji',sans-serif;
    text-shadow:0 1px 3px rgba(0,0,0,.7);
  }
  .slice-lbl .e.rare  { font-size:20px; filter:drop-shadow(0 0 6px var(--gold-soft)); }
  .slice-lbl .e.ultra { font-size:20px; filter:drop-shadow(0 0 6px var(--rose)); }
  .slice-lbl .e.spenta{ opacity:.32; filter:grayscale(.8); }

  /* hub centrale 💋 */
  .hub{
    position:absolute;top:50%;left:50%;width:54px;height:54px;
    margin:-27px 0 0 -27px;border-radius:50%;z-index:5;
    background:radial-gradient(circle at 35% 30%, var(--cream), var(--gold-soft) 45%, var(--gold) 80%, #6b4818);
    box-shadow:0 0 0 2px var(--bg),0 0 0 3px #6b4818,0 4px 10px rgba(0,0,0,.6);
    display:flex;align-items:center;justify-content:center;font-size:24px;
  }

  /* === bottone "GIRA LA RUOTA" ghost-gold (come .btn.ghost-gold .ruota-spin) === */
  .ruota-spin{
    appearance:none;cursor:pointer;font-family:Arial,sans-serif;
    margin:22px auto 0;display:flex;max-width:340px;width:calc(100% - 32px);
    min-height:56px;border-radius:14px;align-items:center;justify-content:center;gap:10px;
    background:transparent;border:1px solid rgba(212,168,108,.45);
    color:var(--gold-soft);font-size:15px;letter-spacing:.1em;text-transform:uppercase;
    box-shadow:none;
  }
  .ruota-spin:disabled{opacity:.5;cursor:not-allowed;}

  /* === pop-up premio (riusa il pattern .ruota-reveal dell'app) === */
  .ruota-reveal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;
    background:rgba(8,2,5,.7);backdrop-filter:blur(2px);z-index:50;}
  .ruota-reveal.show{display:flex;}
  .ruota-reveal .stage{position:relative;display:flex;align-items:center;justify-content:center;}
  .beam{position:absolute;top:40px;left:50%;width:14px;height:340px;transform:translateX(-50%);
    transform-origin:top center;z-index:1;opacity:0;
    background:linear-gradient(180deg,rgba(233,201,143,.85),rgba(233,201,143,0));
    filter:blur(3px);}
  .ruota-reveal.show .beam{animation:ruota-beam .6s ease forwards;}
  @keyframes ruota-beam{0%{opacity:0;transform:translateX(-50%) scaleY(.2);}40%{opacity:1;}100%{opacity:0;transform:translateX(-50%) scaleY(1);}}
  .prize{position:relative;z-index:2;width:248px;max-width:100%;
    background:linear-gradient(180deg,#2a0813,#1c0610);
    border:1px solid rgba(212,168,108,.4);border-radius:18px;padding:20px 18px 18px;
    text-align:center;box-shadow:0 18px 44px rgba(0,0,0,.6);opacity:0;}
  .ruota-reveal.show .prize{animation:ruota-emerge .55s ease forwards;}
  @keyframes ruota-emerge{0%{transform:translateY(-150px) scale(.3);opacity:0;filter:blur(6px);}
    100%{transform:translateY(0) scale(1);opacity:1;filter:blur(0);}}
  .prize .won{font-family:Arial,sans-serif;font-size:11px;letter-spacing:.18em;
    color:var(--gold);text-transform:uppercase;margin:0 0 8px;}
  .prize .big{font-size:54px;margin:6px 0;font-family:'Segoe UI Emoji','Apple Color Emoji',sans-serif;}
  .prize .name{font-family:Georgia,serif;font-size:20px;color:var(--gold-soft);margin:4px 0 10px;}
  .prize .body{font-family:Arial,sans-serif;font-size:13px;color:#cbab9e;margin:0 0 14px;}
  .prize .row{display:flex;gap:8px;justify-content:center;}
  .prize .btn{appearance:none;border:none;cursor:pointer;font-family:Arial,sans-serif;
    min-height:42px;padding:0 18px;border-radius:10px;font-size:13px;letter-spacing:.08em;
    text-transform:uppercase;}
  .prize .btn.ghost{background:transparent;border:1px solid rgba(212,168,108,.45);color:var(--gold-soft);}
</style>
</head>
<body>

<header>
  <h1>🎡 Ruota a premi</h1>
  <div class="sub">G · come nell'app · 13 spicchi (11×30° + 2×15°)</div>
</header>

<div class="giri-card">
  <div>
    <p class="k">I tuoi giri</p>
    <div class="coins">
      <span class="coin"></span><span class="coin"></span><span class="coin"></span>
    </div>
  </div>
  <div class="right">gratis disponibile</div>
</div>

<div class="wheel-wrap">
  <div class="pointer"></div>
  <div class="wheel" id="wheel"></div>
  <div class="winhi" id="winhi"></div>
  <div class="hub">💋</div>
</div>

<button class="ruota-spin" id="spin">GIRA LA RUOTA</button>

<div class="ruota-reveal" id="reveal">
  <div class="stage">
    <div class="beam"></div>
    <div class="prize">
      <p class="won">Hai vinto</p>
      <div class="big" id="prizeEm">·</div>
      <p class="name" id="prizeLbl">—</p>
      <p class="body" id="prizeBody"></p>
      <div class="row">
        <button class="btn ghost" id="prizeClose">Chiudi</button>
      </div>
    </div>
  </div>
</div>

<script>
  // === set 13 spicchi: 11×30° normali + ✖️2 (pos 6) + 💎 (pos 12), entrambi 15° ===
  const SET = [
    { e:'💋', k:'segreto',   l:'Apri un segreto',    sub:'Apri una busta segreta',                     w:1 },
    { e:'🔥', k:'piccante',  l:'Piccante',           sub:'Una proposta piccante da provare stasera',   w:1 },
    { e:'💌', k:'desiderio', l:'Pesca una fantasia', sub:'Dalla bacheca delle cose da provare',        w:1 },
    { e:'🧣', k:'bendare',   l:'Bendare',            sub:'X minuti bendato/a, l\'altro decide',        w:1 },
    { e:'🃏', k:'wild',      l:'Carta wild',         sub:'L\'altro/a decide cosa farti per 24h',       w:1 },
    { e:'💆', k:'massaggio', l:'Massaggio',          sub:'10 minuti, dove preferisce chi ha vinto',    w:1 },
    { e:'✖️', k:'doppio',    l:'Prossimo x2',        sub:'Il prossimo premio vale doppio',             w:0.5, rare:'rare' },
    { e:'📸', k:'polaroid',  l:'Foto osè 24h',       sub:'Inviane una al partner entro 24 ore',        w:1 },
    { e:'🎟️', k:'lampo',    l:'Buono lampo',        sub:'Un buono pescato a sorpresa, vale 24h',      w:1 },
    { e:'👅', k:'orale',     l:'Servizio orale',     sub:'Quando vuole chi ha vinto',                  w:1 },
    { e:'🔁', k:'ancora',    l:'Gira ancora',        sub:'Tiro extra concesso',                        w:1 },
    { e:'⭐', k:'jolly',     l:'Jolly',              sub:'Scegli tu il premio',                        w:1 },
    { e:'💎', k:'jackpot',   l:'Jackpot',            sub:'Uno spicchio a testa: 2 premi totali',       w:0.5, rare:'ultra' },
  ];

  const sumW = SET.reduce((s,x)=>s+x.w,0);            // 12
  const degPerUnit = 360 / sumW;                       // 30
  const slice0 = SET[0].w * degPerUnit;                // 30

  // calcola CENTRO (rispetto al top) di ogni spicchio
  const centers = [];
  let acc = 0;
  for (let i = 0; i < SET.length; i++) {
    const slice = SET[i].w * degPerUnit;
    centers.push(acc + slice/2 - slice0/2);
    acc += slice;
  }

  const wheelEl  = document.getElementById('wheel');
  const winhiEl  = document.getElementById('winhi');
  const spinBtn  = document.getElementById('spin');
  const reveal   = document.getElementById('reveal');
  const prizeEm  = document.getElementById('prizeEm');
  const prizeLbl = document.getElementById('prizeLbl');
  const prizeBody= document.getElementById('prizeBody');
  const prizeClose= document.getElementById('prizeClose');

  let rot = 0;
  let busy = false;

  // === build emoji come nel modulo ruota.js dell'app (rotate(center) translateY(-98), e poi rotate(-center-rot) per stare dritte) ===
  SET.forEach((f, i) => {
    const center = centers[i];
    const lbl = document.createElement('div'); lbl.className = 'slice-lbl';
    const inner = document.createElement('div'); inner.className = 'in';
    inner.style.transform = `rotate(${center}deg) translateY(-98px)`;
    const e = document.createElement('span');
    e.className = 'e' + (f.rare ? ' ' + f.rare : '');
    e.textContent = f.e;
    e.style.transform = `rotate(${-center - rot}deg)`;
    inner.appendChild(e); lbl.appendChild(inner);
    wheelEl.appendChild(lbl);
  });

  function spin() {
    if (busy) return;
    busy = true;
    spinBtn.disabled = true;
    winhiEl.classList.remove('on');

    // estrazione pesata
    let r = Math.random() * sumW;
    let chosen = 0;
    for (let i = 0; i < SET.length; i++) {
      r -= SET[i].w;
      if (r <= 0) { chosen = i; break; }
    }

    const center = centers[chosen];
    const sliceWidth = SET[chosen].w * degPerUnit;
    rot += 360 * 5 + ((360 - (rot % 360) - center) % 360 + 360) % 360;
    wheelEl.style.transform = `rotate(${rot}deg)`;

    // controruota ogni emoji per tenerla dritta
    wheelEl.querySelectorAll('.slice-lbl .e').forEach((e, i) => {
      e.style.transform = `rotate(${-centers[i] - rot}deg)`;
    });

    // aggiorna spotlight allo slice width corretto (15° o 30°)
    const half = sliceWidth / 2;
    winhiEl.style.background =
      `conic-gradient(from ${-half}deg,
        transparent 0 ${sliceWidth}deg,
        rgba(8,2,5,.74) ${sliceWidth}deg 360deg)`;

    setTimeout(() => {
      winhiEl.classList.add('on');
      setTimeout(() => {
        const f = SET[chosen];
        prizeEm.textContent  = f.e;
        prizeLbl.textContent = f.l;
        prizeBody.textContent= f.sub;
        reveal.classList.add('show');
        busy = false;
        spinBtn.disabled = false;
      }, 600);
    }, 4300);
  }

  prizeClose.onclick = () => {
    reveal.classList.remove('show');
    winhiEl.classList.remove('on');
  };
  reveal.onclick = (ev) => {
    if (ev.target === reveal) prizeClose.onclick();
  };

  spinBtn.addEventListener('click', spin);
  wheelEl.addEventListener('click', spin);
</script>
</body>
</html>
