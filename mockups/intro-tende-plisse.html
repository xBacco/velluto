<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Intro · Plissé verticale</title>
<style>
:root{
  --bg:#160409; --bg2:#2a0813; --wine:#5c1026; --wine2:#7a1533;
  --wine-deep:#3d0a1a; --gold:#d4a86c; --gold-soft:#e9c98f; --cream:#f3d9b0;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#000;
  font-family:Georgia,"Times New Roman",serif;color:var(--cream);}

.stage{position:fixed;inset:0;overflow:hidden;cursor:pointer;
  background:radial-gradient(120% 70% at 50% -5%,#3d0a1a 0,transparent 55%),
             linear-gradient(170deg,var(--bg),var(--bg2));}

.reveal{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;z-index:5;
  opacity:0;transition:opacity .8s ease 1s;}
.stage.open .reveal{opacity:1;}
.candle{font-size:54px;filter:drop-shadow(0 0 22px rgba(212,168,108,.55));
  animation:flick 3s ease-in-out infinite;}
@keyframes flick{0%,100%{opacity:1}50%{opacity:.85}}
.kick{letter-spacing:.5em;text-transform:uppercase;font-size:11px;color:var(--gold);
  margin-top:18px;font-family:Arial,Helvetica,sans-serif;}
.title{font-size:46px;margin-top:6px;
  background:linear-gradient(180deg,var(--cream),var(--gold-soft));
  -webkit-background-clip:text;background-clip:text;color:transparent;}

/* mantovana fissa in alto (asta) */
.rail{position:absolute;top:0;left:0;right:0;height:18px;z-index:30;
  background:linear-gradient(180deg,#3a2810,#1a1106);
  border-bottom:2px solid var(--gold);
  box-shadow:0 4px 10px rgba(0,0,0,.6);}
.rail::before{content:"";position:absolute;left:50%;transform:translateX(-50%);
  top:4px;width:60px;height:10px;border-radius:4px;
  background:linear-gradient(180deg,var(--gold-soft),var(--gold),#7a5a2b);
  box-shadow:0 2px 4px rgba(0,0,0,.5);}

/* due tende verticali plissé che si arrotolano in alto */
.curtain{position:absolute;top:18px;bottom:0;width:50%;z-index:20;
  transform-origin: top center;
  transition: transform 1.6s cubic-bezier(.5,.0,.2,1) .3s,
              filter 1.6s ease .3s;
  background:
    /* riflesso laterale */
    linear-gradient(90deg, rgba(255,255,255,.10) 0%, transparent 25%, transparent 75%, rgba(255,255,255,.10) 100%),
    /* pieghe verticali sottili */
    repeating-linear-gradient(90deg,
      rgba(0,0,0,.30) 0 3px,
      rgba(0,0,0,0) 14px,
      rgba(255,255,255,.05) 22px,
      rgba(0,0,0,0) 32px,
      rgba(0,0,0,.30) 42px),
    /* pieghe orizzontali (plissé a fisarmonica) */
    repeating-linear-gradient(180deg,
      rgba(0,0,0,.45) 0 2px,
      rgba(255,255,255,.07) 14px,
      rgba(0,0,0,.45) 26px),
    linear-gradient(180deg,var(--wine2) 0%, var(--wine) 50%, var(--wine-deep) 100%);
  background-size: 100% 100%, 100% 100%, 100% 40px, 100% 100%;
  box-shadow: inset 0 0 60px rgba(0,0,0,.5),
              0 6px 20px rgba(0,0,0,.5);
}
.curtain.left{left:0;border-right:1px solid rgba(0,0,0,.6);}
.curtain.right{right:0;border-left:1px solid rgba(0,0,0,.6);}

/* peso/cordone in basso */
.weight{position:absolute;left:0;right:0;bottom:0;height:10px;
  background:linear-gradient(180deg,#3a2810,#1a1106);
  border-top:1px solid rgba(212,168,108,.5);
  box-shadow:0 2px 6px rgba(0,0,0,.55);}

/* apertura: scaleY → 0 (plissé si comprime in alto) */
.stage.open .curtain{
  transform: scaleY(.04);
  filter: brightness(.85);
  background-size: 100% 100%, 100% 100%, 100% 6px, 100% 100%;
}

/* spot di luce dorato che cresce mentre le tende salgono */
.spot{position:absolute;left:50%;top:55%;transform:translate(-50%,-50%) scale(.5);
  width:520px;height:420px;z-index:10;opacity:0;
  background:radial-gradient(closest-side, rgba(212,168,108,.45), transparent 70%);
  filter:blur(10px);pointer-events:none;
  transition: opacity 1.2s ease .6s, transform 1.4s ease .6s;}
.stage.open .spot{opacity:1;transform:translate(-50%,-50%) scale(1);}

.hint{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);z-index:50;
  font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:rgba(243,217,176,.45);
  font-family:Arial,Helvetica,sans-serif;pointer-events:none;}
</style>
</head>
<body>
<div class="stage" id="stage">
  <div class="spot"></div>
  <div class="reveal">
    <div class="candle">🕯️</div>
    <div class="kick">il nostro spazio</div>
    <div class="title">Lussuria</div>
  </div>
  <div class="curtain left"><div class="weight"></div></div>
  <div class="curtain right"><div class="weight"></div></div>
  <div class="rail"></div>
  <div class="hint">tap per riavviare</div>
</div>
<script>
const stage = document.getElementById('stage');
function play(){
  stage.classList.remove('open');
  void stage.offsetWidth;
  setTimeout(()=>stage.classList.add('open'), 400);
}
stage.addEventListener('click', play);
window.addEventListener('load', ()=> setTimeout(play, 300));
</script>
</body>
</html>
