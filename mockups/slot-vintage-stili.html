<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Slot Vintage · 3 varianti con leva</title>
<style>
:root{
  --bg:#160409; --bg2:#2a0813; --wine:#5c1026; --wine2:#7a1533; --wine3:#3a0a18;
  --gold:#d4a86c; --gold-soft:#e9c98f; --gold-dim:#a87a3e; --gold-deep:#7d5a2a;
  --cream:#f3d9b0; --rose:#c2557a;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;padding:22px 12px 80px;min-height:100vh;
  font-family:Georgia,"Times New Roman",serif;color:var(--cream);
  background:radial-gradient(120% 70% at 50% -5%,#3d0a1a 0,transparent 55%),
             linear-gradient(170deg,var(--bg),var(--bg2));background-attachment:fixed;
  display:flex;flex-direction:column;align-items:center;gap:20px;}
.intro{font-family:Arial,sans-serif;font-size:13px;color:#caa;text-align:center;
  max-width:560px;line-height:1.55;}
.intro b{color:var(--gold-soft);}

.grid{display:grid;gap:22px;width:100%;max-width:1400px;
  grid-template-columns:repeat(auto-fit,minmax(380px,1fr));}

.variant{display:flex;flex-direction:column;border-radius:22px;overflow:hidden;
  border:1px solid rgba(212,168,108,.18);background:linear-gradient(170deg,#1a050d,#0e0306);
  box-shadow:0 14px 40px rgba(0,0,0,.5);}
.v-head{padding:14px 16px 10px;text-align:center;border-bottom:1px solid rgba(212,168,108,.12);}
.v-title{font-family:Georgia,serif;font-size:18px;color:var(--gold-soft);letter-spacing:.08em;
  text-transform:uppercase;margin:0 0 4px;}
.v-sub{font-family:Arial,sans-serif;font-size:11.5px;color:#b58a8a;font-style:italic;margin:0;}
.v-body{padding:16px 14px 20px;display:flex;flex-direction:column;gap:14px;}
.v-desc{font-family:Arial,sans-serif;font-size:11.5px;color:#a98;line-height:1.55;text-align:center;
  background:rgba(255,255,255,.02);border:1px solid rgba(212,168,108,.1);
  border-radius:9px;padding:8px 10px;}

.phone{background:linear-gradient(170deg,#180510,#0a0306);
  border:1px solid rgba(212,168,108,.12);border-radius:16px;padding:14px 14px 18px;}
.ptitle{font-size:24px;margin:0 0 2px;text-align:center;}
.psub{font-family:Arial,sans-serif;font-size:12px;color:#b89aa2;margin:0 0 12px;text-align:center;}
.howto{font-family:Arial,sans-serif;font-size:10.5px;color:var(--gold-dim);text-align:center;
  margin:8px 0 0;font-style:italic;letter-spacing:.05em;}

/* picker chip */
.picker{display:flex;gap:7px;justify-content:center;margin:0 0 14px;}
.chip{flex:1;max-width:110px;border:1px solid rgba(212,168,108,.28);background:rgba(0,0,0,.3);
  border-radius:12px;padding:8px 4px;text-align:center;cursor:pointer;transition:.22s;user-select:none;
  font-family:Arial,sans-serif;color:rgba(243,217,176,.55);display:flex;flex-direction:column;
  align-items:center;gap:2px;}
.chip .ce{font-size:16px;}
.chip .ct{font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;}
.chip.on{border-color:var(--gold);
  background:linear-gradient(180deg,rgba(212,168,108,.22),rgba(212,168,108,.06));
  color:var(--gold);}

/* result */
.result{font-family:Georgia,serif;text-align:center;margin-top:12px;min-height:42px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  opacity:0;transition:opacity .35s;}
.result.show{opacity:1;}
.result .emos{font-size:22px;letter-spacing:5px;}
.result .frase{font-size:13.5px;color:var(--cream);font-style:italic;}

/* === LAYOUT condiviso macchina + leva === */
.deck{display:flex;align-items:stretch;gap:8px;justify-content:center;margin:0 0 4px;}
.machine{flex:1;min-width:0;}
.lever{flex:0 0 auto;width:48px;position:relative;}

/* SHARED reel inside machine */
.reels{display:flex;gap:6px;justify-content:center;}
.reel{flex:1;height:120px;background:linear-gradient(180deg,#0a0205,#1a0610);
  border-radius:8px;overflow:hidden;position:relative;
  box-shadow:inset 0 8px 18px rgba(0,0,0,.75);}
.reel-strip{display:flex;flex-direction:column;align-items:center;
  transition:transform 1.25s cubic-bezier(.17,.67,.18,1);}
.reel-face{height:120px;width:100%;display:flex;flex-direction:column;align-items:center;
  justify-content:center;flex-shrink:0;gap:3px;}
.reel-face .e{font-size:32px;line-height:1;}
.reel-face .t{font-size:9.5px;color:var(--gold-soft);text-transform:uppercase;
  letter-spacing:.08em;font-family:Arial,sans-serif;}
.reel.spinning .reel-strip{transition:none;animation:spinReel .1s linear infinite;}
@keyframes spinReel{from{transform:translateY(0);}to{transform:translateY(-120px);}}

/* === LEVA SHARED — track + asta + pomello === */
.lever-track{position:absolute;top:0;bottom:0;left:50%;transform:translateX(-50%);
  width:6px;background:linear-gradient(90deg,#0a0205,#1a0810,#0a0205);
  border-radius:3px;box-shadow:inset 0 0 6px rgba(0,0,0,.7);}
.lever-rod{position:absolute;left:50%;top:0;transform:translateX(-50%);
  width:10px;border-radius:5px;cursor:grab;user-select:none;touch-action:none;
  transition:top .8s cubic-bezier(.34,1.6,.6,1);}
.lever-rod.pulling{transition:top .4s ease-in;}
.lever-rod.pulled{cursor:grabbing;}
.lever-knob{position:absolute;left:50%;top:0;transform:translate(-50%,-50%);
  width:34px;height:34px;border-radius:50%;cursor:grab;}

/* ===========================================================
   VARIANTE A · OTTONE LUCIDO (cabinet rosso vino)
   =========================================================== */
.va .machine-cabinet{background:linear-gradient(170deg,#4a0f1c 0%,#2a0810 100%);
  border:3px solid;border-image:linear-gradient(140deg,var(--gold-soft),var(--gold-dim),var(--gold-soft)) 1;
  border-radius:14px;padding:16px 12px 14px;position:relative;
  box-shadow:inset 0 0 30px rgba(0,0,0,.6),0 6px 22px rgba(0,0,0,.5);}
.va .machine-cabinet::before{content:"";position:absolute;inset:5px;
  border:1px solid rgba(212,168,108,.3);border-radius:9px;pointer-events:none;}
.va .machine-cabinet .marquee{position:absolute;top:-12px;left:50%;transform:translateX(-50%);
  background:linear-gradient(180deg,var(--gold-soft),var(--gold));color:#3a2405;
  font-family:Georgia,serif;font-size:10px;letter-spacing:.3em;text-transform:uppercase;
  padding:3px 14px;border-radius:5px;font-weight:700;
  box-shadow:0 2px 6px rgba(0,0,0,.5);}
.va .reel{border:2px solid var(--gold-dim);}

.va .lever-track{background:linear-gradient(90deg,#3a0a18,#5c1026,#3a0a18);
  border:1px solid var(--gold-dim);}
.va .lever-rod{height:60%;background:linear-gradient(90deg,var(--gold-deep),var(--gold-soft) 50%,var(--gold-deep));
  box-shadow:0 2px 6px rgba(0,0,0,.5),inset 0 0 3px rgba(255,255,255,.3);}
.va .lever-knob{background:radial-gradient(circle at 35% 30%,#ff5070 0%,#a01030 60%,#5c0818 100%);
  border:2px solid var(--gold-soft);
  box-shadow:0 4px 10px rgba(0,0,0,.6),inset 0 -2px 6px rgba(0,0,0,.4),inset 0 2px 4px rgba(255,255,255,.3);}

/* ===========================================================
   VARIANTE B · BAROCCO DORATO (cabinet nero+oro, dettagli intagliati)
   =========================================================== */
.vb .machine-cabinet{background:radial-gradient(120% 90% at 50% 30%,#1a0508 0%,#050102 100%);
  border:2px solid var(--gold);border-radius:18px 18px 14px 14px;padding:18px 12px 14px;position:relative;
  box-shadow:inset 0 0 40px rgba(0,0,0,.75),0 8px 24px rgba(0,0,0,.55);}
.vb .machine-cabinet::before{content:"";position:absolute;inset:4px;border-radius:14px 14px 11px 11px;
  border:1px dashed rgba(212,168,108,.35);pointer-events:none;}
.vb .machine-cabinet::after{content:"❦       ❦";position:absolute;top:-3px;left:0;right:0;text-align:center;
  font-size:9px;color:var(--gold);letter-spacing:.6em;}
.vb .machine-cabinet .marquee{position:absolute;top:-14px;left:50%;transform:translateX(-50%);
  background:linear-gradient(180deg,#3a0a18,#160409);color:var(--gold-soft);
  border:1.5px solid var(--gold);font-family:Georgia,serif;font-size:11px;letter-spacing:.3em;
  text-transform:uppercase;padding:4px 16px;border-radius:8px;font-weight:600;}
.vb .reel{border:1.5px solid var(--gold);border-radius:6px;
  box-shadow:inset 0 8px 18px rgba(0,0,0,.8),0 0 8px rgba(212,168,108,.15);}

.vb .lever-track{background:linear-gradient(90deg,#0a0205,#1a0810 50%,#0a0205);
  border:1px solid var(--gold);}
.vb .lever-rod{height:55%;background:linear-gradient(90deg,#5a4020,var(--gold) 50%,#5a4020);
  border:1px solid var(--gold-deep);
  box-shadow:0 2px 6px rgba(0,0,0,.5),inset 0 0 4px rgba(255,255,255,.25);}
.vb .lever-knob{background:radial-gradient(circle at 35% 30%,var(--gold-soft) 0%,var(--gold) 45%,var(--gold-deep) 100%);
  border:2px solid #2a1a08;
  box-shadow:0 4px 10px rgba(0,0,0,.65),inset 0 -2px 5px rgba(0,0,0,.4),inset 0 2px 4px rgba(255,255,255,.45);}
.vb .lever-knob::after{content:"❦";position:absolute;inset:0;display:flex;align-items:center;
  justify-content:center;color:#3a2405;font-size:14px;}

/* ===========================================================
   VARIANTE C · NOIR ANNI '20 (cabinet nero opaco, oro brunito sottile)
   =========================================================== */
.vc .machine-cabinet{background:linear-gradient(180deg,#0e0306 0%,#000 100%);
  border:1px solid var(--gold-deep);border-radius:6px;padding:18px 12px 14px;position:relative;
  box-shadow:inset 0 0 25px rgba(0,0,0,.85),0 6px 20px rgba(0,0,0,.55);}
.vc .machine-cabinet::before{content:"";position:absolute;inset:3px;border-radius:4px;
  border:1px solid rgba(212,168,108,.15);pointer-events:none;}
.vc .machine-cabinet .marquee{position:absolute;top:-10px;left:50%;transform:translateX(-50%);
  background:#000;color:var(--gold-dim);
  font-family:Georgia,serif;font-size:9.5px;letter-spacing:.4em;text-transform:uppercase;
  padding:2px 18px;border-top:1px solid var(--gold-deep);border-bottom:1px solid var(--gold-deep);}
.vc .reel{border:1px solid var(--gold-deep);border-radius:2px;
  box-shadow:inset 0 6px 14px rgba(0,0,0,.9);}
.vc .reel-face .t{color:var(--gold-dim);}

.vc .lever-track{background:#000;border:1px solid var(--gold-deep);width:4px;}
.vc .lever-rod{height:58%;background:linear-gradient(90deg,#1a1208,#3a2a14 50%,#1a1208);
  border:1px solid var(--gold-deep);
  box-shadow:0 2px 4px rgba(0,0,0,.6);width:8px;}
.vc .lever-knob{background:radial-gradient(circle at 35% 30%,var(--gold-dim) 0%,#3a2a14 80%);
  border:1px solid var(--gold-deep);
  box-shadow:0 4px 10px rgba(0,0,0,.7),inset 0 -2px 4px rgba(0,0,0,.5),inset 0 2px 3px rgba(212,168,108,.2);
  width:28px;height:28px;}

/* footer scelta */
.pickbar{display:flex;justify-content:center;}
.btn-pick{appearance:none;border:1px solid rgba(212,168,108,.4);
  background:rgba(212,168,108,.08);color:var(--cream);font-family:Arial,sans-serif;font-size:12px;
  letter-spacing:.1em;text-transform:uppercase;padding:9px 14px;border-radius:10px;cursor:pointer;
  transition:.2s;}
.btn-pick:hover{background:rgba(212,168,108,.18);border-color:var(--gold);color:var(--gold);}
.btn-pick.selected{background:var(--gold);color:#3a2405;border-color:var(--gold);}
</style>
</head>
<body>

<div class="intro">
  Tre cabinet <b>Casinò Vintage</b> con leva laterale. <b>Tira giù la leva</b>
  (o tocca/clicca, segue il dito) e rilascia: i rulli partono.
</div>

<div class="grid" id="grid"></div>

<script>
const FACCE = {
  az: [{e:'💋',t:'Bacia'},{e:'👅',t:'Lecca'},{e:'🫦',t:'Mordi'},{e:'💆',t:'Massaggia'},{e:'✋',t:'Sfiora'},{e:'💨',t:'Soffia su'}],
  co: [{e:'👄',t:'il collo'},{e:'👂',t:"l'orecchio"},{e:'🦵',t:"l'interno coscia"},{e:'🍑',t:'il lato B'},{e:'🫀',t:'il petto'},{e:'🤚',t:'la schiena'}],
  lu: [{e:'🛋️',t:'sul divano'},{e:'🚿',t:'sotto la doccia'},{e:'🍳',t:'in cucina'},{e:'🚗',t:'in macchina'},{e:'🛏️',t:'a letto'},{e:'🌃',t:'sul balcone'}],
};
const ORDER = ['az','co','lu'];
const CHIP = { az:'💋', co:'🫦', lu:'📍' };
const LABEL = { az:'Azione', co:'Corpo', lu:'Dove' };
const FACE_H = 120;

const VARIANTS = [
  { id:'va', name:'A · Ottone Lucido',
    sub:'cabinet rosso vino, leva pomello rubino',
    desc:'Cornice oro lucida, cabinet rosso vino, leva ottone con pomello a sfera rubino. Calda e classica.' },
  { id:'vb', name:'B · Barocco Dorato',
    sub:'nero + oro, intagli, pomello cesellato',
    desc:'Cabinet nero notte con bordo oro pieno, dettagli a fiorella, pomello dorato cesellato. Più gioielleria che casinò.' },
  { id:'vc', name:'C · Noir Anni \'20',
    sub:'nero opaco, oro brunito, linee sottili',
    desc:'Cabinet quadrato nero opaco, oro brunito appena percepibile, leva sottile. Minimal vintage, da speakeasy.' },
];

function el(tag, cls, txt){
  const n = document.createElement(tag);
  if (cls) n.className = cls;
  if (txt != null) n.textContent = txt;
  return n;
}

function buildPicker(state, onChange){
  const wrap = el('div', 'picker');
  for (const k of ORDER){
    const c = el('div', 'chip' + (state[k] ? ' on' : ''));
    c.appendChild(el('span', 'ce', CHIP[k]));
    c.appendChild(el('span', 'ct', LABEL[k]));
    c.onclick = () => {
      const active = ORDER.filter(x => state[x]).length;
      if (state[k] && active === 1) return;
      state[k] = !state[k];
      onChange();
    };
    wrap.appendChild(c);
  }
  return wrap;
}

function buildReel(faces){
  const reel = el('div', 'reel');
  const strip = el('div', 'reel-strip');
  for (const f of faces){
    const cell = el('div', 'reel-face');
    cell.appendChild(el('div', 'e', f.e));
    cell.appendChild(el('div', 't', f.t));
    strip.appendChild(cell);
  }
  reel.appendChild(strip);
  reel._strip = strip;
  return reel;
}

function buildMockup(V){
  const card = el('article', 'variant ' + V.id);

  const head = el('div', 'v-head');
  head.appendChild(el('h2', 'v-title', V.name));
  head.appendChild(el('p', 'v-sub', V.sub));
  card.appendChild(head);

  const body = el('div', 'v-body');
  const phone = el('div', 'phone');
  phone.appendChild(el('h2', 'ptitle', '🎰 Slot'));
  phone.appendChild(el('p', 'psub', 'Scegli i rulli e tira la leva.'));

  const state = { az:true, co:true, lu:true };

  const deck = el('div', 'deck');
  const machine = el('div', 'machine');
  const cabinet = el('div', 'machine-cabinet');
  cabinet.appendChild(el('div', 'marquee', 'LUSSURIA'));
  const reelsWrap = el('div', 'reels');
  cabinet.appendChild(reelsWrap);
  machine.appendChild(cabinet);
  deck.appendChild(machine);

  // leva
  const lever = el('div', 'lever');
  const track = el('div', 'lever-track');
  const rod = el('div', 'lever-rod');
  const knob = el('div', 'lever-knob');
  rod.appendChild(knob);
  lever.appendChild(track);
  lever.appendChild(rod);
  deck.appendChild(lever);

  phone.appendChild(deck);
  phone.appendChild(el('div', 'howto', 'Trascina la leva verso il basso'));

  const result = el('div', 'result');
  const emos = el('div', 'emos');
  const frase = el('div', 'frase');
  result.appendChild(emos);
  result.appendChild(frase);

  const reels = {};
  function rebuildReels(){
    reelsWrap.replaceChildren();
    for (const k of ORDER){
      if (!state[k]) continue;
      const r = buildReel(FACCE[k]);
      reelsWrap.appendChild(r);
      reels[k] = r;
    }
  }

  const picker = buildPicker(state, rebuildReels);
  phone.insertBefore(picker, deck);
  rebuildReels();
  phone.appendChild(result);

  // === LEVA INTERATTIVA ===
  // Misure: la rod parte top:0 e può scendere fino a top: trackHeight - rodHeight
  // Stato: idle / pulling (drag) / firing (auto-anim + spin) / settling (return)
  let busy = false;
  let pulling = false;
  let startY = 0;
  let startTop = 0;
  let maxTop = 0;
  let currentTop = 0;

  function lev(){
    const trackH = track.getBoundingClientRect().height;
    const rodH = rod.getBoundingClientRect().height;
    maxTop = trackH - rodH;
    rod.style.top = currentTop + 'px';
  }

  function fire(){
    if (busy) return;
    busy = true;
    result.classList.remove('show');
    const picks = {};
    const activeKeys = ORDER.filter(k => state[k]);
    for (const k of activeKeys){
      picks[k] = Math.floor(Math.random()*6);
      const r = reels[k];
      r.classList.add('spinning');
      r._strip.style.transform = 'translateY(0)';
    }
    activeKeys.forEach((k, idx) => {
      setTimeout(() => {
        const r = reels[k];
        r.classList.remove('spinning');
        r._strip.style.transform = 'translateY(' + (-picks[k] * FACE_H) + 'px)';
      }, 500 + idx*240);
    });
    setTimeout(() => {
      const eList = [], rest = [];
      let act = '';
      for (const k of ORDER){
        if (picks[k] == null) continue;
        const f = FACCE[k][picks[k]];
        eList.push(f.e);
        if (k === 'az') act = f.t; else rest.push(f.t);
      }
      if (!act) act = rest.shift() || '';
      emos.textContent = eList.join(' ');
      frase.textContent = act + (rest.length ? ' ' + rest.join(' ') : '');
      result.classList.add('show');
      busy = false;
    }, 500 + (activeKeys.length-1)*240 + 1300);
  }

  function returnLever(){
    rod.classList.remove('pulled');
    rod.style.transition = '';
    currentTop = 0;
    rod.style.top = '0px';
  }

  function onDown(e){
    if (busy) return;
    e.preventDefault();
    lev();
    pulling = true;
    rod.classList.add('pulled');
    rod.classList.add('pulling');
    startY = (e.touches ? e.touches[0].clientY : e.clientY);
    startTop = currentTop;
  }
  function onMove(e){
    if (!pulling) return;
    e.preventDefault();
    const y = (e.touches ? e.touches[0].clientY : e.clientY);
    let t = startTop + (y - startY);
    if (t < 0) t = 0;
    if (t > maxTop) t = maxTop;
    currentTop = t;
    rod.style.top = t + 'px';
  }
  function onUp(){
    if (!pulling) return;
    pulling = false;
    rod.classList.remove('pulling');
    const reached = currentTop >= maxTop * 0.7;
    if (reached){
      // snap a fondo, poi spara, poi torna su
      rod.style.transition = 'top .12s ease-out';
      currentTop = maxTop;
      rod.style.top = currentTop + 'px';
      setTimeout(() => {
        fire();
        setTimeout(returnLever, 220);
      }, 130);
    } else {
      returnLever();
    }
  }

  rod.addEventListener('mousedown', onDown);
  rod.addEventListener('touchstart', onDown, {passive:false});
  window.addEventListener('mousemove', onMove);
  window.addEventListener('touchmove', onMove, {passive:false});
  window.addEventListener('mouseup', onUp);
  window.addEventListener('touchend', onUp);

  // calibra le altezze quando entra in DOM
  requestAnimationFrame(() => requestAnimationFrame(lev));

  body.appendChild(phone);
  body.appendChild(el('p', 'v-desc', V.desc));

  const pickbar = el('div', 'pickbar');
  const btn = el('button', 'btn-pick', 'Scegli ' + V.name.split('·')[0].trim());
  btn.onclick = () => {
    document.querySelectorAll('.btn-pick').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  };
  pickbar.appendChild(btn);
  body.appendChild(pickbar);

  card.appendChild(body);
  return card;
}

const grid = document.getElementById('grid');
VARIANTS.forEach(V => grid.appendChild(buildMockup(V)));
</script>

</body>
</html>
