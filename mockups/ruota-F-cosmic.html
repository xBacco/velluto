<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Ruota F · Stellaria (Cosmic Tarot)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-1: #04051a;
    --bg-2: #0a0e2e;
    --fg:   #e6e0ff;
    --muted:#7a82a8;

    --void-1: #15203a;
    --void-2: #211440;
    --void-3: #2d1452;

    --gold-1: #ffe066;
    --gold-2: #d4b020;
    --gold-3: #7a6010;

    --star: #f5f0ff;
    --rare:  #ffd042;
    --ultra: #f8f0ff;
  }
  * { box-sizing: border-box; }
  html, body {
    margin:0; padding:0;
    background:
      radial-gradient(ellipse at top, var(--bg-2), var(--bg-1) 70%),
      var(--bg-1);
    color:var(--fg);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    overflow-x:hidden;
  }
  body { padding:40px 16px 80px; }

  /* Stelle scintillanti sullo sfondo */
  body::before {
    content:'';
    position:fixed; inset:0;
    background-image:
      radial-gradient(2px 2px at 20px 30px, var(--star), transparent),
      radial-gradient(1px 1px at 40px 70px, var(--star), transparent),
      radial-gradient(1px 1px at 50px 160px, var(--gold-1), transparent),
      radial-gradient(2px 2px at 130px 40px, var(--star), transparent),
      radial-gradient(1px 1px at 80px 200px, var(--star), transparent),
      radial-gradient(1.5px 1.5px at 170px 110px, var(--gold-1), transparent),
      radial-gradient(1px 1px at 230px 250px, var(--star), transparent),
      radial-gradient(1px 1px at 300px 80px, var(--star), transparent),
      radial-gradient(2px 2px at 340px 200px, var(--gold-1), transparent);
    background-size: 400px 300px;
    background-repeat:repeat;
    opacity:0.7;
    pointer-events:none;
    animation:twinkle 8s ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity:0.6; }
    50% { opacity:0.9; }
  }

  header { text-align:center; max-width:560px; margin:0 auto 36px; }
  h1 {
    font-family:'Cinzel', serif;
    font-size:32px;
    font-weight:500;
    margin:0;
    letter-spacing:0.4em;
    color:var(--gold-1);
    text-transform:uppercase;
    padding-left:0.4em;
    text-shadow:0 0 12px rgba(255,224,102,0.4);
  }
  header .sub {
    font-size:10px;
    color:var(--gold-2);
    margin-top:8px;
    letter-spacing:0.4em;
    text-transform:uppercase;
  }
  header::after {
    content:'✦';
    display:block;
    color:var(--gold-1);
    margin-top:14px;
    font-size:14px;
    text-shadow:0 0 8px var(--gold-1);
  }

  .stage { max-width:380px; margin:0 auto; }

  .wheel-wrap {
    position:relative;
    width:340px;
    height:340px;
    margin:0 auto;
    filter:drop-shadow(0 0 32px rgba(255,224,102,0.15)) drop-shadow(0 16px 36px rgba(0,0,0,0.7));
  }

  /* Puntatore — stella a 5 punte oro */
  .pointer {
    position:absolute;
    top:-4px; left:50%;
    transform:translateX(-50%);
    width:24px; height:30px;
    z-index:10;
  }
  .pointer::before {
    content:'';
    position:absolute; inset:0;
    background:linear-gradient(180deg, var(--gold-1), var(--gold-2));
    clip-path:polygon(50% 100%, 25% 50%, 0 30%, 30% 20%, 50% 0, 70% 20%, 100% 30%, 75% 50%);
    filter:drop-shadow(0 0 6px var(--gold-1));
  }

  /* Anello cosmico */
  .ring {
    position:absolute; inset:0;
    border-radius:50%;
    background:conic-gradient(from 0deg,
      var(--gold-2) 0deg, var(--gold-1) 60deg, var(--gold-3) 120deg,
      var(--gold-2) 180deg, var(--gold-1) 240deg, var(--gold-3) 300deg,
      var(--gold-2) 360deg);
    -webkit-mask: radial-gradient(circle, transparent 0 calc(50% - 10px), black calc(50% - 10px));
            mask: radial-gradient(circle, transparent 0 calc(50% - 10px), black calc(50% - 10px));
    z-index:2;
    pointer-events:none;
    filter:drop-shadow(0 0 8px var(--gold-2));
  }

  /* Stelline sull'anello (decorative) */
  .star {
    position:absolute;
    top:50%; left:50%;
    width:5px; height:5px;
    margin:-2.5px 0 0 -2.5px;
    background:var(--star);
    clip-path:polygon(50% 0, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    box-shadow:0 0 4px var(--gold-1);
    z-index:3;
    pointer-events:none;
  }

  /* Ruota */
  .wheel {
    position:absolute; inset:10px;
    border-radius:50%;
    overflow:hidden;
    transition:transform 4.5s cubic-bezier(0.17, 0.67, 0.16, 0.99);
    cursor:pointer;
    box-shadow:
      inset 0 0 0 2px var(--gold-3),
      inset 0 0 30px rgba(0,0,0,0.5);
    z-index:1;
  }
  .wheel.spinning { cursor:not-allowed; }

  .emoji {
    position:absolute;
    top:50%; left:50%;
    width:42px; height:42px;
    margin:-21px 0 0 -21px;
    display:flex; align-items:center; justify-content:center;
    font-size:24px;
    line-height:1;
    pointer-events:none;
    font-family:'Segoe UI Emoji','Apple Color Emoji','Noto Color Emoji',sans-serif;
    z-index:5;
    text-shadow:0 0 6px rgba(0,0,0,0.8);
  }
  .emoji.rare {
    font-size:17px;
    width:28px; height:28px;
    margin:-14px 0 0 -14px;
    filter:drop-shadow(0 0 8px var(--gold-1));
  }
  .emoji.ultra {
    font-size:17px;
    width:28px; height:28px;
    margin:-14px 0 0 -14px;
    filter:drop-shadow(0 0 10px var(--star));
  }

  /* Hub centrale — luna falcata */
  .hub {
    position:absolute;
    top:50%; left:50%;
    width:60px; height:60px;
    margin:-30px 0 0 -30px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 30%, var(--star) 0%, var(--gold-1) 50%, var(--gold-2) 100%);
    box-shadow:
      0 0 0 2px var(--bg-1),
      0 0 0 4px var(--gold-2),
      0 0 20px rgba(255,224,102,0.5),
      0 4px 12px rgba(0,0,0,0.8);
    z-index:6;
    display:flex; align-items:center; justify-content:center;
    font-size:26px;
    color:var(--bg-1);
  }

  .controls { margin-top:36px; text-align:center; }
  .spin-btn {
    background:linear-gradient(180deg, var(--void-3), var(--void-2));
    border:1px solid var(--gold-2);
    color:var(--gold-1);
    padding:14px 44px;
    border-radius:0;
    font-family:'Cinzel', serif;
    font-size:13px;
    font-weight:700;
    letter-spacing:0.35em;
    text-transform:uppercase;
    cursor:pointer;
    text-shadow:0 0 8px rgba(255,224,102,0.5);
    box-shadow:
      0 0 0 1px var(--gold-3),
      0 6px 14px rgba(0,0,0,0.6),
      inset 0 0 12px rgba(255,224,102,0.1);
    transition:all 0.2s;
    position:relative;
  }
  .spin-btn::before, .spin-btn::after {
    content:'✦';
    position:absolute;
    top:50%; transform:translateY(-50%);
    color:var(--gold-2);
    font-size:11px;
  }
  .spin-btn::before { left:14px; }
  .spin-btn::after  { right:14px; }
  .spin-btn:hover { box-shadow:0 0 0 1px var(--gold-1), 0 6px 14px rgba(0,0,0,0.6), inset 0 0 16px rgba(255,224,102,0.2); }
  .spin-btn:active { transform:translateY(1px); }
  .spin-btn:disabled { opacity:0.4; cursor:not-allowed; }

  .result {
    margin-top:28px;
    min-height:96px;
    padding:22px;
    background:linear-gradient(135deg, var(--void-2), var(--void-1));
    border:1px solid var(--gold-3);
    text-align:center;
    opacity:0;
    transform:translateY(8px);
    transition:opacity 0.4s, transform 0.4s;
    box-shadow:
      0 0 0 1px var(--bg-1),
      0 8px 22px rgba(0,0,0,0.6),
      inset 0 0 30px rgba(45,20,82,0.5);
    position:relative;
  }
  .result::before, .result::after {
    content:'✦';
    position:absolute;
    color:var(--gold-2);
    font-size:12px;
  }
  .result::before { top:8px; left:10px; }
  .result::after  { bottom:8px; right:10px; }
  .result.on { opacity:1; transform:translateY(0); }
  .result .lab {
    font-family:'Cinzel', serif;
    font-size:10px;
    letter-spacing:0.4em;
    color:var(--gold-2);
    text-transform:uppercase;
    margin-bottom:10px;
  }
  .result .prize {
    font-family:'Cinzel', serif;
    font-size:22px;
    font-weight:500;
    color:var(--gold-1);
    letter-spacing:0.06em;
    text-shadow:0 0 10px rgba(255,224,102,0.4);
  }
  .result .prize .em { font-size:26px; margin-right:10px; vertical-align:middle; }
  .result .sub { font-size:13px; color:var(--muted); margin-top:8px; font-style:italic; }
</style>
</head>
<body>

<header>
  <h1>Stellaria</h1>
  <div class="sub">Stile F · Cosmic Tarot</div>
</header>

<div class="stage">
  <div class="wheel-wrap">
    <div class="pointer"></div>
    <div class="ring"></div>
    <div class="wheel" id="wheel"></div>
    <div class="hub">☾</div>
  </div>

  <div class="controls">
    <button class="spin-btn" id="spin">Consulta gli astri</button>
  </div>

  <div class="result" id="result">
    <div class="lab">Il fato dice</div>
    <div class="prize"><span class="em" id="resEm">·</span><span id="resLbl">—</span></div>
    <div class="sub" id="resSub"></div>
  </div>
</div>

<script>
  const SET = [
    { e:'💋', k:'segreto',   l:'Apri un segreto',    sub:'Apri una busta segreta',                     w:1 },
    { e:'🔥', k:'piccante',  l:'Piccante',           sub:'Una proposta piccante da provare stasera',   w:1 },
    { e:'💌', k:'desiderio', l:'Pesca una fantasia', sub:'Dalla bacheca delle cose da provare',        w:1 },
    { e:'🧣', k:'bendare',   l:'Bendare',            sub:'X minuti bendato/a, l\'altro decide',        w:1 },
    { e:'🃏', k:'wild',      l:'Carta wild',         sub:'L\'altro/a decide cosa farti per 24h',       w:1 },
    { e:'💆', k:'massaggio', l:'Massaggio',          sub:'10 minuti, dove preferisce chi ha vinto',    w:1 },
    { e:'✖️', k:'doppio',    l:'Prossimo x2',        sub:'Il prossimo premio vale doppio',             w:0.5, rare:'rare' },
    { e:'📸', k:'polaroid',  l:'Foto osè 24h',       sub:'Inviane una al partner entro 24 ore',        w:1 },
    { e:'🎟️', k:'lampo',    l:'Buono lampo',        sub:'Un buono pescato a sorpresa, vale 24h',      w:1 },
    { e:'👅', k:'orale',     l:'Servizio orale',     sub:'Quando vuole chi ha vinto',                  w:1 },
    { e:'🔁', k:'ancora',    l:'Gira ancora',        sub:'Tiro extra concesso',                        w:1 },
    { e:'⭐', k:'jolly',     l:'Jolly',              sub:'Scegli tu il premio',                        w:1 },
    { e:'💎', k:'jackpot',   l:'Jackpot',            sub:'Uno spicchio a testa: 2 premi totali',       w:0.5, rare:'ultra' },
  ];

  const NORMAL_COLORS = ['var(--void-1)','var(--void-2)','var(--void-3)'];
  const COLOR_RARE = 'var(--rare)';
  const COLOR_ULTRA = 'var(--ultra)';

  const wheelEl  = document.getElementById('wheel');
  const wrapEl   = document.querySelector('.wheel-wrap');
  const spinBtn  = document.getElementById('spin');
  const resEl    = document.getElementById('result');
  const resEm    = document.getElementById('resEm');
  const resLbl   = document.getElementById('resLbl');
  const resSub   = document.getElementById('resSub');

  const sumW = SET.reduce((s,x)=>s+x.w, 0);
  const degPerUnit = 360 / sumW;
  const slice0 = SET[0].w * degPerUnit;

  function colorsFor(set) {
    let nIdx = 0;
    return set.map(item => {
      if (item.rare === 'rare')  return COLOR_RARE;
      if (item.rare === 'ultra') return COLOR_ULTRA;
      const c = NORMAL_COLORS[nIdx % NORMAL_COLORS.length];
      nIdx++;
      return c;
    });
  }
  const COLORS = colorsFor(SET);

  (function build() {
    const stops = [];
    let acc = 0;
    for (let i = 0; i < SET.length; i++) {
      const slice = SET[i].w * degPerUnit;
      stops.push(`${COLORS[i]} ${acc.toFixed(4)}deg ${(acc+slice).toFixed(4)}deg`);
      acc += slice;
    }
    const startOffset = (-90 - slice0/2).toFixed(4);
    wheelEl.style.background = `conic-gradient(from ${startOffset}deg, ${stops.join(', ')})`;

    // dividers oro brillanti con glow
    acc = 0;
    for (let i = 0; i < SET.length; i++) {
      const slice = SET[i].w * degPerUnit;
      acc += slice;
      const boundaryTop = acc - slice0/2;
      const d = document.createElement('div');
      d.style.cssText = `position:absolute;top:50%;left:50%;width:1.5px;height:162px;background:var(--gold-2);box-shadow:0 0 4px var(--gold-1);transform-origin:top center;transform:translateX(-0.75px) rotate(${(boundaryTop+180).toFixed(4)}deg);pointer-events:none;z-index:3;opacity:0.75;`;
      wheelEl.appendChild(d);
    }

    // emoji
    const R = 124;
    acc = 0;
    for (let i = 0; i < SET.length; i++) {
      const item = SET[i];
      const slice = item.w * degPerUnit;
      const center = acc + slice/2;
      const angTop = center - slice0/2;
      const rad = (angTop - 90) * Math.PI / 180;
      const x = Math.cos(rad) * R;
      const y = Math.sin(rad) * R;
      const em = document.createElement('div');
      em.className = 'emoji ' + (item.rare || '');
      em.textContent = item.e;
      em.style.transform = `translate(${x}px, ${y}px)`;
      wheelEl.appendChild(em);
      acc += slice;
    }

    // stelline sull'anello (12)
    for (let i = 0; i < 12; i++) {
      const ang = (i * 30) * Math.PI / 180;
      const r = 172;
      const x = Math.cos(ang - Math.PI/2) * r;
      const y = Math.sin(ang - Math.PI/2) * r;
      const s = document.createElement('div');
      s.className = 'star';
      s.style.transform = `translate(${x}px, ${y}px)`;
      wrapEl.appendChild(s);
    }
  })();

  let spinning = false;
  let totalRotation = 0;

  function spin() {
    if (spinning) return;
    spinning = true;
    wheelEl.classList.add('spinning');
    spinBtn.disabled = true;
    resEl.classList.remove('on');

    let r = Math.random() * sumW;
    let chosen = 0;
    for (let i = 0; i < SET.length; i++) {
      r -= SET[i].w;
      if (r <= 0) { chosen = i; break; }
    }

    let acc = 0;
    for (let i = 0; i < chosen; i++) acc += SET[i].w * degPerUnit;
    const sliceChosen = SET[chosen].w * degPerUnit;
    const chosenCenterFromTop = acc + sliceChosen/2 - slice0/2;

    const turns = 5 + Math.floor(Math.random()*3);
    const target = turns * 360 + (360 - chosenCenterFromTop);
    totalRotation += target;
    wheelEl.style.transform = `rotate(${totalRotation}deg)`;

    setTimeout(() => {
      spinning = false;
      wheelEl.classList.remove('spinning');
      spinBtn.disabled = false;
      const item = SET[chosen];
      resEm.textContent  = item.e;
      resLbl.textContent = item.l;
      resSub.textContent = item.sub;
      resEl.classList.add('on');
    }, 4700);
  }

  spinBtn.addEventListener('click', spin);
  wheelEl.addEventListener('click', spin);
</script>
</body>
</html>
