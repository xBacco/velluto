<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Intro · Velluto teatrale</title>
<style>
:root{
  --bg:#160409; --bg2:#2a0813; --wine:#5c1026; --wine2:#7a1533;
  --wine-deep:#3d0a1a; --gold:#d4a86c; --gold-soft:#e9c98f; --cream:#f3d9b0;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#000;
  font-family:Georgia,"Times New Roman",serif;color:var(--cream);}

.stage{position:fixed;inset:0;overflow:hidden;cursor:pointer;
  background:radial-gradient(120% 70% at 50% -5%,#3d0a1a 0,transparent 55%),
             linear-gradient(170deg,var(--bg),var(--bg2));}

/* contenuto retroscena */
.reveal{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;
  opacity:0;transform:scale(.96);transition:opacity .6s ease, transform .9s ease;}
.stage.open .reveal{opacity:1;transform:scale(1);}
.candle{font-size:54px;filter:drop-shadow(0 0 22px rgba(212,168,108,.55));
  animation:flick 3s ease-in-out infinite;}
@keyframes flick{0%,100%{opacity:1}50%{opacity:.85}}
.kick{letter-spacing:.5em;text-transform:uppercase;font-size:11px;color:var(--gold);
  margin-top:18px;font-family:Arial,Helvetica,sans-serif;}
.title{font-size:46px;margin-top:6px;
  background:linear-gradient(180deg,var(--cream),var(--gold-soft));
  -webkit-background-clip:text;background-clip:text;color:transparent;}

/* mantovana / pelmet */
.pelmet{position:absolute;top:0;left:0;right:0;height:64px;z-index:30;
  background:
    linear-gradient(180deg, rgba(0,0,0,.0) 60%, rgba(0,0,0,.55) 100%),
    repeating-linear-gradient(90deg,
      rgba(0,0,0,.35) 0 6px,
      rgba(255,255,255,.05) 14px,
      rgba(0,0,0,.35) 26px),
    linear-gradient(180deg,var(--wine2),var(--wine) 70%,var(--wine-deep));
  box-shadow: 0 8px 18px rgba(0,0,0,.6);
  border-bottom:2px solid rgba(212,168,108,.35);
}
.pelmet::after{content:"";position:absolute;left:0;right:0;bottom:-12px;height:14px;
  background:repeating-linear-gradient(90deg,
    var(--gold) 0 2px, rgba(0,0,0,0) 2px 12px);
  filter:drop-shadow(0 1px 0 rgba(0,0,0,.6));}

/* tende */
.curtain{position:absolute;top:0;bottom:0;width:54%;z-index:20;
  transform-origin:top center;
  transition: transform 2.2s cubic-bezier(.55,.04,.18,1);
  will-change:transform;
  background:
    radial-gradient(120% 80% at 50% 0%, rgba(255,255,255,.06), transparent 60%),
    radial-gradient(80% 100% at var(--hl) 50%, rgba(255,255,255,.08), transparent 55%),
    repeating-linear-gradient(90deg,
      rgba(0,0,0,.55) 0 4px,
      rgba(0,0,0,0) 22px,
      rgba(255,255,255,.07) 36px,
      rgba(0,0,0,0) 50px,
      rgba(0,0,0,.55) 64px),
    linear-gradient(180deg,var(--wine2) 0%, var(--wine) 35%, var(--wine-deep) 100%);
  box-shadow: inset 0 0 80px rgba(0,0,0,.55);
}
.curtain.left{left:0;--hl:35%;border-right:1px solid rgba(0,0,0,.4);}
.curtain.right{right:0;--hl:65%;border-left:1px solid rgba(0,0,0,.4);}

/* cordone con nappa - tieback dorato */
.tieback{position:absolute;top:42%;width:60px;height:60px;z-index:25;
  pointer-events:none;
  transition: transform .55s ease-in, opacity .35s ease-in .35s;}
.tieback.left{left:calc(54% - 30px);}
.tieback.right{right:calc(54% - 30px);}
.rope{position:absolute;inset:18px 0 auto 0;height:8px;border-radius:8px;
  background:linear-gradient(180deg,var(--gold-soft),var(--gold) 40%, #8a6a36);
  box-shadow:0 2px 4px rgba(0,0,0,.5);}
.tassel{position:absolute;left:50%;top:24px;transform:translateX(-50%);width:14px;height:28px;
  background:linear-gradient(180deg,var(--gold-soft),var(--gold) 50%,#8a6a36);
  border-radius:2px 2px 6px 6px;
  box-shadow:0 4px 6px rgba(0,0,0,.55);}
.tassel::after{content:"";position:absolute;left:50%;top:-6px;width:10px;height:10px;
  border-radius:50%;background:radial-gradient(circle at 30% 30%, var(--gold-soft), #6f5021);
  transform:translateX(-50%);}

/* apertura */
.stage.open .curtain.left{transform:translateX(-100%) rotateZ(-1.5deg);}
.stage.open .curtain.right{transform:translateX(100%) rotateZ(1.5deg);}
.stage.open .tieback{transform:translateY(60px) rotate(20deg);opacity:0;}

/* pavimento (ombra a terra) */
.floor{position:absolute;left:0;right:0;bottom:0;height:120px;z-index:5;
  background:linear-gradient(180deg,transparent,rgba(0,0,0,.55));pointer-events:none;}

/* replay hint */
.hint{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);z-index:50;
  font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:rgba(243,217,176,.45);
  font-family:Arial,Helvetica,sans-serif;pointer-events:none;}
</style>
</head>
<body>
<div class="stage" id="stage">
  <div class="floor"></div>
  <div class="reveal">
    <div class="candle">🕯️</div>
    <div class="kick">il nostro spazio</div>
    <div class="title">Lussuria</div>
  </div>
  <div class="curtain left"></div>
  <div class="curtain right"></div>
  <div class="tieback left"><div class="rope"></div><div class="tassel"></div></div>
  <div class="tieback right"><div class="rope"></div><div class="tassel"></div></div>
  <div class="pelmet"></div>
  <div class="hint">tap per riavviare</div>
</div>
<script>
const stage = document.getElementById('stage');
function play(){
  stage.classList.remove('open');
  void stage.offsetWidth;
  setTimeout(()=>stage.classList.add('open'), 650);
}
stage.addEventListener('click', play);
window.addEventListener('load', ()=> setTimeout(play, 350));
</script>
</body>
</html>
