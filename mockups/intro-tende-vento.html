<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Intro · Soffio di vento</title>
<style>
:root{
  --bg:#160409; --bg2:#2a0813; --wine:#5c1026; --wine2:#7a1533;
  --wine-deep:#3d0a1a; --gold:#d4a86c; --gold-soft:#e9c98f; --cream:#f3d9b0;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#000;
  font-family:Georgia,"Times New Roman",serif;color:var(--cream);}

.stage{position:fixed;inset:0;overflow:hidden;cursor:pointer;perspective:1200px;
  background:radial-gradient(120% 70% at 50% -5%,#3d0a1a 0,transparent 55%),
             linear-gradient(170deg,var(--bg),var(--bg2));}

.reveal{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;z-index:5;
  opacity:0;transition:opacity .9s ease 1.6s;}
.stage.open .reveal{opacity:1;}
.candle{font-size:54px;filter:drop-shadow(0 0 22px rgba(212,168,108,.55));
  animation:flick 3s ease-in-out infinite;}
@keyframes flick{0%,100%{opacity:1}50%{opacity:.85}}
.kick{letter-spacing:.5em;text-transform:uppercase;font-size:11px;color:var(--gold);
  margin-top:18px;font-family:Arial,Helvetica,sans-serif;}
.title{font-size:46px;margin-top:6px;
  background:linear-gradient(180deg,var(--cream),var(--gold-soft));
  -webkit-background-clip:text;background-clip:text;color:transparent;}

/* tende: ferme → gonfiano verso lo spettatore → soffiano ai lati */
.curtain{position:absolute;top:0;bottom:0;width:55%;z-index:20;
  transform-origin: top center;
  transform-style:preserve-3d;
  background:
    radial-gradient(80% 60% at var(--hl) 40%, rgba(255,255,255,.10), transparent 60%),
    repeating-linear-gradient(91deg,
      rgba(0,0,0,.50) 0 6px,
      rgba(0,0,0,0) 20px,
      rgba(255,255,255,.06) 32px,
      rgba(0,0,0,0) 46px,
      rgba(0,0,0,.50) 60px),
    linear-gradient(180deg,var(--wine2) 0%, var(--wine) 40%, var(--wine-deep) 100%);
  box-shadow: inset 0 0 90px rgba(0,0,0,.55);
}
.curtain.left{left:0;--hl:40%;border-right:1px solid rgba(0,0,0,.6);
  animation: idleL 4s ease-in-out infinite;}
.curtain.right{right:0;--hl:60%;border-left:1px solid rgba(0,0,0,.6);
  animation: idleR 4s ease-in-out infinite;}
@keyframes idleL{0%,100%{transform:rotateY(0)} 50%{transform:rotateY(2deg)}}
@keyframes idleR{0%,100%{transform:rotateY(0)} 50%{transform:rotateY(-2deg)}}

/* keyframes apertura: gonfia + soffia */
@keyframes blowL{
  0%   { transform: rotateY(0deg) translateX(0) translateZ(0); opacity:1; }
  35%  { transform: rotateY(-18deg) translateX(-3%) translateZ(120px) skewY(-2deg); opacity:1; }
  65%  { transform: rotateY(-10deg) translateX(-40%) translateZ(80px) skewY(-1deg); opacity:.85; }
  100% { transform: rotateY(8deg) translateX(-115%) translateZ(0) skewY(0); opacity:0; }
}
@keyframes blowR{
  0%   { transform: rotateY(0deg) translateX(0) translateZ(0); opacity:1; }
  35%  { transform: rotateY(18deg) translateX(3%) translateZ(120px) skewY(2deg); opacity:1; }
  65%  { transform: rotateY(10deg) translateX(40%) translateZ(80px) skewY(1deg); opacity:.85; }
  100% { transform: rotateY(-8deg) translateX(115%) translateZ(0) skewY(0); opacity:0; }
}
.stage.open .curtain.left{
  animation: blowL 2.6s cubic-bezier(.3,.0,.2,1) forwards;
}
.stage.open .curtain.right{
  animation: blowR 2.6s cubic-bezier(.3,.0,.2,1) forwards;
}

/* particelle dorate scia, partono al gonfio */
.wind{position:absolute;inset:0;z-index:25;pointer-events:none;opacity:0;
  transition:opacity .3s ease .6s;}
.stage.open .wind{opacity:1;}
.wind span{position:absolute;width:4px;height:4px;border-radius:50%;
  background:var(--gold-soft);box-shadow:0 0 10px var(--gold);}
.wind .l1{left:32%;top:30%;animation: gustL 2.2s ease-out .7s forwards;}
.wind .l2{left:28%;top:55%;animation: gustL 2.2s ease-out .9s forwards;}
.wind .l3{left:36%;top:75%;animation: gustL 2.2s ease-out 1.1s forwards;width:3px;height:3px;}
.wind .l4{left:24%;top:42%;animation: gustL 2.2s ease-out 1.3s forwards;}
.wind .r1{right:32%;top:30%;animation: gustR 2.2s ease-out .7s forwards;}
.wind .r2{right:28%;top:55%;animation: gustR 2.2s ease-out .9s forwards;}
.wind .r3{right:36%;top:75%;animation: gustR 2.2s ease-out 1.1s forwards;width:3px;height:3px;}
.wind .r4{right:24%;top:42%;animation: gustR 2.2s ease-out 1.3s forwards;}
@keyframes gustL{
  0%{transform:translate(0,0) scale(.4);opacity:0;}
  20%{opacity:1;}
  100%{transform:translate(-60vw,-10vh) scale(1);opacity:0;}
}
@keyframes gustR{
  0%{transform:translate(0,0) scale(.4);opacity:0;}
  20%{opacity:1;}
  100%{transform:translate(60vw,-10vh) scale(1);opacity:0;}
}

/* glow dorato che cresce */
.glow{position:absolute;left:50%;top:50%;width:520px;height:520px;
  transform:translate(-50%,-50%) scale(.4);z-index:8;opacity:0;
  background:radial-gradient(closest-side, rgba(212,168,108,.40), transparent 70%);
  filter:blur(12px);
  transition: opacity 1.4s ease .5s, transform 1.8s ease .5s;
  pointer-events:none;}
.stage.open .glow{opacity:1;transform:translate(-50%,-50%) scale(1);}

.hint{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);z-index:50;
  font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:rgba(243,217,176,.45);
  font-family:Arial,Helvetica,sans-serif;pointer-events:none;}
</style>
</head>
<body>
<div class="stage" id="stage">
  <div class="glow"></div>
  <div class="reveal">
    <div class="candle">🕯️</div>
    <div class="kick">il nostro spazio</div>
    <div class="title">Lussuria</div>
  </div>
  <div class="wind">
    <span class="l1"></span><span class="l2"></span><span class="l3"></span><span class="l4"></span>
    <span class="r1"></span><span class="r2"></span><span class="r3"></span><span class="r4"></span>
  </div>
  <div class="curtain left"></div>
  <div class="curtain right"></div>
  <div class="hint">tap per riavviare</div>
</div>
<script>
const stage = document.getElementById('stage');
function play(){
  stage.classList.remove('open');
  void stage.offsetWidth;
  setTimeout(()=>stage.classList.add('open'), 500);
}
stage.addEventListener('click', play);
window.addEventListener('load', ()=> setTimeout(play, 350));
</script>
</body>
</html>
