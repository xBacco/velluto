<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Ruota A · Velluto & Ottone</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-1: #14080a;
    --bg-2: #1f0d10;
    --fg:   #f3e3cc;
    --muted:#a18c75;

    --vel-1: #3a0c14;  /* bordeaux profondo */
    --vel-2: #61131e;  /* bordeaux medio */

    --gold-1: #f5e0a3;
    --gold-2: #d4a857;
    --gold-3: #8a6620;
    --gold-4: #4a3812;

    --rare:  #e6c062;   /* oro spicchio raro */
    --ultra: #2a1545;   /* viola reale */
  }
  * { box-sizing: border-box; }
  html, body {
    margin:0; padding:0;
    background:
      radial-gradient(ellipse at top, var(--bg-2), var(--bg-1) 70%),
      var(--bg-1);
    color:var(--fg);
    font-family:'Inter', sans-serif;
    min-height:100vh;
  }
  body { padding:32px 16px 80px; }

  header { text-align:center; max-width:560px; margin:0 auto 28px; }
  h1 {
    font-family:'Cormorant Garamond', serif;
    font-size:32px;
    font-weight:600;
    margin:0;
    letter-spacing:0.04em;
    background:linear-gradient(180deg, var(--gold-1), var(--gold-2));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  header .sub {
    font-size:12px;
    color:var(--muted);
    margin-top:6px;
    letter-spacing:0.18em;
    text-transform:uppercase;
  }

  .stage { max-width:380px; margin:0 auto; }

  .wheel-wrap {
    position:relative;
    width:340px;
    height:340px;
    margin:0 auto;
  }

  /* Puntatore — gemma a goccia rossa con riflesso */
  .pointer {
    position:absolute;
    top:-2px; left:50%;
    transform:translateX(-50%);
    width:26px; height:36px;
    z-index:10;
    filter:drop-shadow(0 4px 8px rgba(0,0,0,0.8));
  }
  .pointer::before {
    content:'';
    position:absolute; inset:0;
    background:linear-gradient(180deg, #ff6b78 0%, #c41a2d 50%, #6a0a18 100%);
    clip-path:polygon(50% 100%, 0 35%, 25% 0, 75% 0, 100% 35%);
    border-radius:4px;
  }
  .pointer::after {
    content:'';
    position:absolute; top:6px; left:8px;
    width:6px; height:10px;
    background:rgba(255,255,255,0.5);
    border-radius:50%;
    filter:blur(1px);
  }

  /* Anello in ottone */
  .ring {
    position:absolute; inset:-4px;
    border-radius:50%;
    background:
      conic-gradient(
        from 0deg,
        var(--gold-2) 0deg, var(--gold-1) 30deg, var(--gold-3) 90deg,
        var(--gold-2) 150deg, var(--gold-1) 210deg, var(--gold-3) 270deg,
        var(--gold-2) 330deg, var(--gold-2) 360deg
      );
    box-shadow:
      0 0 0 1px var(--gold-4),
      0 12px 36px rgba(0,0,0,0.7),
      inset 0 0 0 1px rgba(255,255,255,0.1);
    pointer-events:none;
    z-index:1;
  }
  .ring::before {
    content:'';
    position:absolute; inset:8px;
    border-radius:50%;
    background:var(--bg-1);
    box-shadow:
      inset 0 0 0 1px var(--gold-4),
      inset 0 0 12px rgba(0,0,0,0.5);
    z-index:1;
  }

  /* Borchie sull'anello (12 distribuite, decorative) */
  .stud {
    position:absolute;
    top:50%; left:50%;
    width:6px; height:6px;
    margin:-3px 0 0 -3px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 35%, var(--gold-1), var(--gold-3) 70%, var(--gold-4));
    box-shadow:0 0 2px rgba(0,0,0,0.7);
    z-index:3;
    pointer-events:none;
  }

  /* Ruota */
  .wheel {
    position:absolute; inset:14px;
    border-radius:50%;
    overflow:hidden;
    transition:transform 4.5s cubic-bezier(0.17, 0.67, 0.16, 0.99);
    cursor:pointer;
    box-shadow:
      inset 0 0 0 1px rgba(0,0,0,0.5),
      inset 0 0 20px rgba(0,0,0,0.4);
    z-index:3;
  }
  .wheel.spinning { cursor:not-allowed; }

  /* Texture velluto */
  .wheel::after {
    content:'';
    position:absolute; inset:0;
    border-radius:50%;
    background:
      radial-gradient(ellipse at 30% 30%, rgba(255,200,180,0.08), transparent 60%),
      radial-gradient(ellipse at 70% 70%, rgba(0,0,0,0.3), transparent 60%);
    pointer-events:none;
    mix-blend-mode:overlay;
  }

  .emoji {
    position:absolute;
    top:50%; left:50%;
    width:42px; height:42px;
    margin:-21px 0 0 -21px;
    display:flex; align-items:center; justify-content:center;
    font-size:24px;
    line-height:1;
    pointer-events:none;
    text-shadow:0 1px 3px rgba(0,0,0,0.7);
    font-family:'Segoe UI Emoji','Apple Color Emoji','Noto Color Emoji',sans-serif;
    z-index:5;
  }
  .emoji.rare {
    font-size:16px;
    width:28px; height:28px;
    margin:-14px 0 0 -14px;
    filter:drop-shadow(0 0 6px rgba(245,224,163,0.8));
  }
  .emoji.ultra {
    font-size:16px;
    width:28px; height:28px;
    margin:-14px 0 0 -14px;
    filter:drop-shadow(0 0 8px rgba(180,140,220,0.9));
  }

  /* Hub centrale — medaglione */
  .hub {
    position:absolute;
    top:50%; left:50%;
    width:64px; height:64px;
    margin:-32px 0 0 -32px;
    border-radius:50%;
    background:
      radial-gradient(circle at 35% 30%, var(--gold-1) 0%, var(--gold-2) 35%, var(--gold-3) 70%, var(--gold-4));
    box-shadow:
      0 0 0 2px var(--gold-4),
      0 0 0 4px var(--vel-1),
      0 0 0 5px var(--gold-2),
      0 4px 10px rgba(0,0,0,0.7);
    z-index:5;
    display:flex; align-items:center; justify-content:center;
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:24px;
    color:var(--vel-1);
    text-shadow:0 1px 1px rgba(255,255,255,0.3);
  }

  .controls { margin-top:32px; text-align:center; }
  .spin-btn {
    background:linear-gradient(180deg, var(--gold-1), var(--gold-2) 50%, var(--gold-3));
    border:1px solid var(--gold-4);
    color:var(--vel-1);
    padding:14px 38px;
    border-radius:30px;
    font-family:'Cormorant Garamond', serif;
    font-size:20px;
    font-weight:700;
    letter-spacing:0.16em;
    text-transform:uppercase;
    cursor:pointer;
    box-shadow:
      0 6px 16px rgba(0,0,0,0.5),
      inset 0 1px 0 rgba(255,255,255,0.4),
      inset 0 -2px 0 rgba(0,0,0,0.2);
    transition:transform 0.12s, box-shadow 0.12s;
  }
  .spin-btn:active {
    transform:translateY(1px);
    box-shadow:0 3px 8px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.4);
  }
  .spin-btn:disabled {
    opacity:0.5;
    cursor:not-allowed;
  }

  .result {
    margin-top:24px;
    min-height:90px;
    padding:18px;
    background:
      linear-gradient(135deg, var(--vel-1), var(--vel-2));
    border:1px solid var(--gold-3);
    border-radius:14px;
    box-shadow:
      inset 0 0 0 1px rgba(245,224,163,0.15),
      0 6px 18px rgba(0,0,0,0.4);
    text-align:center;
    opacity:0;
    transform:translateY(8px);
    transition:opacity 0.4s, transform 0.4s;
  }
  .result.on { opacity:1; transform:translateY(0); }
  .result .lab {
    font-size:11px;
    letter-spacing:0.2em;
    text-transform:uppercase;
    color:var(--gold-2);
    margin-bottom:6px;
  }
  .result .prize {
    font-family:'Cormorant Garamond', serif;
    font-size:28px;
    font-weight:600;
    color:var(--gold-1);
  }
  .result .prize .em { font-size:32px; margin-right:8px; }
  .result .sub { font-size:13px; color:var(--muted); margin-top:6px; font-style:italic; }
</style>
</head>
<body>

<header>
  <h1>La Ruota</h1>
  <div class="sub">Stile A · Velluto & Ottone</div>
</header>

<div class="stage">
  <div class="wheel-wrap">
    <div class="pointer"></div>
    <div class="ring" id="ring"></div>
    <div class="wheel" id="wheel"></div>
    <div class="hub">N</div>
  </div>

  <div class="controls">
    <button class="spin-btn" id="spin">Gira</button>
  </div>

  <div class="result" id="result">
    <div class="lab">Risultato</div>
    <div class="prize"><span class="em" id="resEm">·</span><span id="resLbl">—</span></div>
    <div class="sub" id="resSub"></div>
  </div>
</div>

<script>
  const SET = [
    { e:'💋', k:'segreto',   l:'Apri un segreto',    sub:'Apri una busta segreta',                     w:1 },
    { e:'🔥', k:'piccante',  l:'Piccante',           sub:'Una proposta piccante da provare stasera',   w:1 },
    { e:'💌', k:'desiderio', l:'Pesca una fantasia', sub:'Dalla bacheca delle cose da provare',        w:1 },
    { e:'🧣', k:'bendare',   l:'Bendare',            sub:'X minuti bendato/a, l\'altro decide',        w:1 },
    { e:'🃏', k:'wild',      l:'Carta wild',         sub:'L\'altro/a decide cosa farti per 24h',       w:1 },
    { e:'💆', k:'massaggio', l:'Massaggio',          sub:'10 minuti, dove preferisce chi ha vinto',    w:1 },
    { e:'✖️', k:'doppio',    l:'Prossimo x2',        sub:'Il prossimo premio vale doppio',             w:0.5, rare:'rare' },
    { e:'📸', k:'polaroid',  l:'Foto osè 24h',       sub:'Inviane una al partner entro 24 ore',        w:1 },
    { e:'🎟️', k:'lampo',    l:'Buono lampo',        sub:'Un buono pescato a sorpresa, vale 24h',      w:1 },
    { e:'👅', k:'orale',     l:'Servizio orale',     sub:'Quando vuole chi ha vinto',                  w:1 },
    { e:'🔁', k:'ancora',    l:'Gira ancora',        sub:'Tiro extra concesso',                        w:1 },
    { e:'⭐', k:'jolly',     l:'Jolly',              sub:'Scegli tu il premio',                        w:1 },
    { e:'💎', k:'jackpot',   l:'Jackpot',            sub:'Uno spicchio a testa: 2 premi totali',       w:0.5, rare:'ultra' },
  ];

  const NORMAL_COLORS = ['var(--vel-1)','var(--vel-2)'];
  const COLOR_RARE = 'var(--rare)';
  const COLOR_ULTRA = 'var(--ultra)';

  const wheelEl  = document.getElementById('wheel');
  const ringEl   = document.getElementById('ring');
  const spinBtn  = document.getElementById('spin');
  const resEl    = document.getElementById('result');
  const resEm    = document.getElementById('resEm');
  const resLbl   = document.getElementById('resLbl');
  const resSub   = document.getElementById('resSub');

  const sumW = SET.reduce((s,x)=>s+x.w, 0);
  const degPerUnit = 360 / sumW;
  const slice0 = SET[0].w * degPerUnit;

  function colorsFor(set) {
    let nIdx = 0;
    return set.map(item => {
      if (item.rare === 'rare')  return COLOR_RARE;
      if (item.rare === 'ultra') return COLOR_ULTRA;
      const c = NORMAL_COLORS[nIdx % NORMAL_COLORS.length];
      nIdx++;
      return c;
    });
  }
  const COLORS = colorsFor(SET);

  // Costruzione ruota
  (function build() {
    // conic gradient
    const stops = [];
    let acc = 0;
    for (let i = 0; i < SET.length; i++) {
      const slice = SET[i].w * degPerUnit;
      stops.push(`${COLORS[i]} ${acc.toFixed(4)}deg ${(acc+slice).toFixed(4)}deg`);
      acc += slice;
    }
    const startOffset = (-90 - slice0/2).toFixed(4);
    wheelEl.style.background = `conic-gradient(from ${startOffset}deg, ${stops.join(', ')})`;

    // dividers ottone (doppio strato)
    acc = 0;
    for (let i = 0; i < SET.length; i++) {
      const slice = SET[i].w * degPerUnit;
      acc += slice;
      const boundaryTop = acc - slice0/2;
      const dark = document.createElement('div');
      dark.style.cssText = `position:absolute;top:50%;left:50%;width:3px;height:160px;background:#1a0810;transform-origin:top center;transform:translateX(-1.5px) rotate(${(boundaryTop+180).toFixed(4)}deg);pointer-events:none;z-index:2;`;
      wheelEl.appendChild(dark);
      const gold = document.createElement('div');
      gold.style.cssText = `position:absolute;top:50%;left:50%;width:1px;height:160px;background:var(--gold-2);box-shadow:0 0 3px var(--gold-2);transform-origin:top center;transform:translateX(-0.5px) rotate(${(boundaryTop+180).toFixed(4)}deg);pointer-events:none;z-index:3;opacity:0.7;`;
      wheelEl.appendChild(gold);
    }

    // emoji
    const R = 128;
    acc = 0;
    for (let i = 0; i < SET.length; i++) {
      const item = SET[i];
      const slice = item.w * degPerUnit;
      const center = acc + slice/2;
      const angTop = center - slice0/2;
      const rad = (angTop - 90) * Math.PI / 180;
      const x = Math.cos(rad) * R;
      const y = Math.sin(rad) * R;
      const em = document.createElement('div');
      em.className = 'emoji ' + (item.rare || '');
      em.textContent = item.e;
      em.style.transform = `translate(${x}px, ${y}px)`;
      wheelEl.appendChild(em);
      acc += slice;
    }

    // borchie decorative su ring (12 pos)
    for (let i = 0; i < 12; i++) {
      const ang = (i * 30) * Math.PI / 180;
      const r = 174;
      const x = Math.cos(ang - Math.PI/2) * r;
      const y = Math.sin(ang - Math.PI/2) * r;
      const s = document.createElement('div');
      s.className = 'stud';
      s.style.transform = `translate(${x}px, ${y}px)`;
      ringEl.appendChild(s);
    }
  })();

  let spinning = false;
  let totalRotation = 0;

  function spin() {
    if (spinning) return;
    spinning = true;
    wheelEl.classList.add('spinning');
    spinBtn.disabled = true;
    resEl.classList.remove('on');

    let r = Math.random() * sumW;
    let chosen = 0;
    for (let i = 0; i < SET.length; i++) {
      r -= SET[i].w;
      if (r <= 0) { chosen = i; break; }
    }

    let acc = 0;
    for (let i = 0; i < chosen; i++) acc += SET[i].w * degPerUnit;
    const sliceChosen = SET[chosen].w * degPerUnit;
    const chosenCenterFromTop = acc + sliceChosen/2 - slice0/2;

    const turns = 5 + Math.floor(Math.random()*3);
    const target = turns * 360 + (360 - chosenCenterFromTop);
    totalRotation += target;
    wheelEl.style.transform = `rotate(${totalRotation}deg)`;

    setTimeout(() => {
      spinning = false;
      wheelEl.classList.remove('spinning');
      spinBtn.disabled = false;
      const item = SET[chosen];
      resEm.textContent  = item.e;
      resLbl.textContent = item.l;
      resSub.textContent = item.sub;
      resEl.classList.add('on');
    }, 4700);
  }

  spinBtn.addEventListener('click', spin);
  wheelEl.addEventListener('click', spin);
</script>
</body>
</html>
