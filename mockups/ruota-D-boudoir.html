<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Ruota D · Soie Noire (Boudoir Minimal)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tenor+Sans&family=Cormorant+Garamond:ital,wght@0,300;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-1: #0a0508;
    --bg-2: #14080d;
    --fg:   #f0e6dc;
    --muted:#857a72;

    --sat-1: #181216;  /* nero satinato */
    --sat-2: #2a1f24;  /* grigio antracite caldo */

    --rg-1: #f0c4b5;   /* oro rosa chiaro */
    --rg-2: #d49b8a;   /* oro rosa */
    --rg-3: #a06a5a;   /* oro rosa scuro */
    --rg-4: #5e3a30;

    --pearl: #f8ece2;
    --rare:  #f0c4b5;
    --ultra: #f8ece2;
  }
  * { box-sizing: border-box; }
  html, body {
    margin:0; padding:0;
    background:
      radial-gradient(ellipse at center, var(--bg-2), var(--bg-1) 80%),
      var(--bg-1);
    color:var(--fg);
    font-family:'Tenor Sans', sans-serif;
    min-height:100vh;
  }
  body { padding:40px 16px 80px; }

  header { text-align:center; max-width:560px; margin:0 auto 36px; }
  h1 {
    font-family:'Cormorant Garamond', serif;
    font-weight:300;
    font-size:36px;
    margin:0;
    letter-spacing:0.36em;
    color:var(--rg-1);
    text-transform:uppercase;
    padding-left:0.36em;
  }
  header .sub {
    font-size:10px;
    color:var(--rg-3);
    margin-top:10px;
    letter-spacing:0.45em;
    text-transform:uppercase;
  }
  header::after {
    content:'';
    display:block;
    width:40px;
    height:1px;
    background:var(--rg-2);
    margin:18px auto 0;
  }

  .stage { max-width:380px; margin:0 auto; }

  .wheel-wrap {
    position:relative;
    width:340px;
    height:340px;
    margin:0 auto;
    filter:drop-shadow(0 16px 40px rgba(212,155,138,0.15)) drop-shadow(0 6px 16px rgba(0,0,0,0.6));
  }

  /* Puntatore — linea sottile oro rosa */
  .pointer {
    position:absolute;
    top:0; left:50%;
    transform:translateX(-50%);
    width:14px; height:22px;
    z-index:10;
    background:linear-gradient(180deg, var(--rg-1), var(--rg-2));
    clip-path:polygon(50% 100%, 0 0, 100% 0);
  }
  .pointer::before {
    content:'';
    position:absolute;
    top:-10px; left:50%;
    width:1px; height:10px;
    margin-left:-0.5px;
    background:var(--rg-2);
  }

  /* Anello sottile oro rosa */
  .ring {
    position:absolute; inset:0;
    border-radius:50%;
    background:conic-gradient(from 0deg,
      var(--rg-2) 0deg, var(--rg-1) 50deg, var(--rg-3) 130deg,
      var(--rg-2) 180deg, var(--rg-1) 230deg, var(--rg-3) 310deg,
      var(--rg-2) 360deg);
    -webkit-mask: radial-gradient(circle, transparent 0 calc(50% - 8px), black calc(50% - 8px));
            mask: radial-gradient(circle, transparent 0 calc(50% - 8px), black calc(50% - 8px));
    z-index:2;
    pointer-events:none;
  }

  /* Anello interno decorativo (linea sottile a metà raggio) */
  .inner-ring {
    position:absolute; inset:46px;
    border-radius:50%;
    border:1px solid var(--rg-3);
    z-index:4;
    pointer-events:none;
    opacity:0.6;
  }

  /* Ruota */
  .wheel {
    position:absolute; inset:8px;
    border-radius:50%;
    overflow:hidden;
    transition:transform 4.5s cubic-bezier(0.17, 0.67, 0.16, 0.99);
    cursor:pointer;
    box-shadow:inset 0 0 0 1px var(--rg-4);
    z-index:1;
  }
  .wheel.spinning { cursor:not-allowed; }

  .emoji {
    position:absolute;
    top:50%; left:50%;
    width:42px; height:42px;
    margin:-21px 0 0 -21px;
    display:flex; align-items:center; justify-content:center;
    font-size:24px;
    line-height:1;
    pointer-events:none;
    font-family:'Segoe UI Emoji','Apple Color Emoji','Noto Color Emoji',sans-serif;
    z-index:5;
    text-shadow:0 1px 2px rgba(0,0,0,0.7);
  }
  .emoji.rare {
    font-size:17px;
    width:28px; height:28px;
    margin:-14px 0 0 -14px;
    filter:drop-shadow(0 0 8px var(--rg-2));
  }
  .emoji.ultra {
    font-size:17px;
    width:28px; height:28px;
    margin:-14px 0 0 -14px;
    filter:drop-shadow(0 0 8px var(--pearl));
  }

  /* Hub centrale — cerchio minimal oro rosa */
  .hub {
    position:absolute;
    top:50%; left:50%;
    width:52px; height:52px;
    margin:-26px 0 0 -26px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 30%, var(--rg-1), var(--rg-2) 50%, var(--rg-3));
    box-shadow:
      0 0 0 1px var(--bg-1),
      0 0 0 2px var(--rg-2),
      0 4px 10px rgba(0,0,0,0.6);
    z-index:6;
    display:flex; align-items:center; justify-content:center;
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:22px;
    color:var(--bg-1);
  }

  .controls { margin-top:40px; text-align:center; }
  .spin-btn {
    background:transparent;
    border:1px solid var(--rg-2);
    color:var(--rg-1);
    padding:14px 44px;
    border-radius:0;
    font-family:'Tenor Sans', sans-serif;
    font-size:11px;
    letter-spacing:0.42em;
    text-transform:uppercase;
    cursor:pointer;
    transition:all 0.25s;
  }
  .spin-btn:hover {
    background:rgba(240,196,181,0.06);
    border-color:var(--rg-1);
    color:var(--pearl);
  }
  .spin-btn:active { transform:translateY(1px); }
  .spin-btn:disabled { opacity:0.4; cursor:not-allowed; }

  .result {
    margin-top:28px;
    min-height:96px;
    padding:22px 18px;
    background:linear-gradient(180deg, var(--sat-2), var(--sat-1));
    border-top:1px solid var(--rg-3);
    border-bottom:1px solid var(--rg-3);
    text-align:center;
    opacity:0;
    transform:translateY(8px);
    transition:opacity 0.4s, transform 0.4s;
  }
  .result.on { opacity:1; transform:translateY(0); }
  .result .lab {
    font-size:9px;
    letter-spacing:0.4em;
    color:var(--rg-3);
    text-transform:uppercase;
    margin-bottom:10px;
  }
  .result .prize {
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:24px;
    font-weight:500;
    color:var(--rg-1);
    letter-spacing:0.04em;
  }
  .result .prize .em { font-style:normal; font-size:28px; margin-right:10px; vertical-align:middle; }
  .result .sub { font-size:12px; color:var(--muted); margin-top:8px; font-style:italic; }
</style>
</head>
<body>

<header>
  <h1>Soie Noire</h1>
  <div class="sub">Stile D · Boudoir Minimal</div>
</header>

<div class="stage">
  <div class="wheel-wrap">
    <div class="pointer"></div>
    <div class="ring"></div>
    <div class="wheel" id="wheel"></div>
    <div class="inner-ring"></div>
    <div class="hub">N</div>
  </div>

  <div class="controls">
    <button class="spin-btn" id="spin">Tournez la roue</button>
  </div>

  <div class="result" id="result">
    <div class="lab">Pour vous</div>
    <div class="prize"><span class="em" id="resEm">·</span><span id="resLbl">—</span></div>
    <div class="sub" id="resSub"></div>
  </div>
</div>

<script>
  const SET = [
    { e:'💋', k:'segreto',   l:'Apri un segreto',    sub:'Apri una busta segreta',                     w:1 },
    { e:'🔥', k:'piccante',  l:'Piccante',           sub:'Una proposta piccante da provare stasera',   w:1 },
    { e:'💌', k:'desiderio', l:'Pesca una fantasia', sub:'Dalla bacheca delle cose da provare',        w:1 },
    { e:'🧣', k:'bendare',   l:'Bendare',            sub:'X minuti bendato/a, l\'altro decide',        w:1 },
    { e:'🃏', k:'wild',      l:'Carta wild',         sub:'L\'altro/a decide cosa farti per 24h',       w:1 },
    { e:'💆', k:'massaggio', l:'Massaggio',          sub:'10 minuti, dove preferisce chi ha vinto',    w:1 },
    { e:'✖️', k:'doppio',    l:'Prossimo x2',        sub:'Il prossimo premio vale doppio',             w:0.5, rare:'rare' },
    { e:'📸', k:'polaroid',  l:'Foto osè 24h',       sub:'Inviane una al partner entro 24 ore',        w:1 },
    { e:'🎟️', k:'lampo',    l:'Buono lampo',        sub:'Un buono pescato a sorpresa, vale 24h',      w:1 },
    { e:'👅', k:'orale',     l:'Servizio orale',     sub:'Quando vuole chi ha vinto',                  w:1 },
    { e:'🔁', k:'ancora',    l:'Gira ancora',        sub:'Tiro extra concesso',                        w:1 },
    { e:'⭐', k:'jolly',     l:'Jolly',              sub:'Scegli tu il premio',                        w:1 },
    { e:'💎', k:'jackpot',   l:'Jackpot',            sub:'Uno spicchio a testa: 2 premi totali',       w:0.5, rare:'ultra' },
  ];

  const NORMAL_COLORS = ['var(--sat-1)','var(--sat-2)'];
  const COLOR_RARE = 'var(--rare)';
  const COLOR_ULTRA = 'var(--ultra)';

  const wheelEl  = document.getElementById('wheel');
  const spinBtn  = document.getElementById('spin');
  const resEl    = document.getElementById('result');
  const resEm    = document.getElementById('resEm');
  const resLbl   = document.getElementById('resLbl');
  const resSub   = document.getElementById('resSub');

  const sumW = SET.reduce((s,x)=>s+x.w, 0);
  const degPerUnit = 360 / sumW;
  const slice0 = SET[0].w * degPerUnit;

  function colorsFor(set) {
    let nIdx = 0;
    return set.map(item => {
      if (item.rare === 'rare')  return COLOR_RARE;
      if (item.rare === 'ultra') return COLOR_ULTRA;
      const c = NORMAL_COLORS[nIdx % NORMAL_COLORS.length];
      nIdx++;
      return c;
    });
  }
  const COLORS = colorsFor(SET);

  (function build() {
    const stops = [];
    let acc = 0;
    for (let i = 0; i < SET.length; i++) {
      const slice = SET[i].w * degPerUnit;
      stops.push(`${COLORS[i]} ${acc.toFixed(4)}deg ${(acc+slice).toFixed(4)}deg`);
      acc += slice;
    }
    const startOffset = (-90 - slice0/2).toFixed(4);
    wheelEl.style.background = `conic-gradient(from ${startOffset}deg, ${stops.join(', ')})`;

    // dividers sottili oro rosa
    acc = 0;
    for (let i = 0; i < SET.length; i++) {
      const slice = SET[i].w * degPerUnit;
      acc += slice;
      const boundaryTop = acc - slice0/2;
      const d = document.createElement('div');
      d.style.cssText = `position:absolute;top:50%;left:50%;width:1px;height:165px;background:var(--rg-3);transform-origin:top center;transform:translateX(-0.5px) rotate(${(boundaryTop+180).toFixed(4)}deg);pointer-events:none;z-index:3;opacity:0.55;`;
      wheelEl.appendChild(d);
    }

    // emoji
    const R = 128;
    acc = 0;
    for (let i = 0; i < SET.length; i++) {
      const item = SET[i];
      const slice = item.w * degPerUnit;
      const center = acc + slice/2;
      const angTop = center - slice0/2;
      const rad = (angTop - 90) * Math.PI / 180;
      const x = Math.cos(rad) * R;
      const y = Math.sin(rad) * R;
      const em = document.createElement('div');
      em.className = 'emoji ' + (item.rare || '');
      em.textContent = item.e;
      em.style.transform = `translate(${x}px, ${y}px)`;
      wheelEl.appendChild(em);
      acc += slice;
    }
  })();

  let spinning = false;
  let totalRotation = 0;

  function spin() {
    if (spinning) return;
    spinning = true;
    wheelEl.classList.add('spinning');
    spinBtn.disabled = true;
    resEl.classList.remove('on');

    let r = Math.random() * sumW;
    let chosen = 0;
    for (let i = 0; i < SET.length; i++) {
      r -= SET[i].w;
      if (r <= 0) { chosen = i; break; }
    }

    let acc = 0;
    for (let i = 0; i < chosen; i++) acc += SET[i].w * degPerUnit;
    const sliceChosen = SET[chosen].w * degPerUnit;
    const chosenCenterFromTop = acc + sliceChosen/2 - slice0/2;

    const turns = 5 + Math.floor(Math.random()*3);
    const target = turns * 360 + (360 - chosenCenterFromTop);
    totalRotation += target;
    wheelEl.style.transform = `rotate(${totalRotation}deg)`;

    setTimeout(() => {
      spinning = false;
      wheelEl.classList.remove('spinning');
      spinBtn.disabled = false;
      const item = SET[chosen];
      resEm.textContent  = item.e;
      resLbl.textContent = item.l;
      resSub.textContent = item.sub;
      resEl.classList.add('on');
    }, 4700);
  }

  spinBtn.addEventListener('click', spin);
  wheelEl.addEventListener('click', spin);
</script>
</body>
</html>
