<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Slot · 3 estetiche</title>
<style>
:root{
  --bg:#160409; --bg2:#2a0813; --wine:#5c1026; --wine2:#7a1533; --wine3:#3a0a18;
  --gold:#d4a86c; --gold-soft:#e9c98f; --gold-dim:#a87a3e;
  --cream:#f3d9b0; --rose:#c2557a;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;padding:22px 12px 80px;min-height:100vh;
  font-family:Georgia,"Times New Roman",serif;color:var(--cream);
  background:radial-gradient(120% 70% at 50% -5%,#3d0a1a 0,transparent 55%),
             linear-gradient(170deg,var(--bg),var(--bg2));background-attachment:fixed;
  display:flex;flex-direction:column;align-items:center;gap:20px;}
.intro{font-family:Arial,sans-serif;font-size:13px;color:#caa;text-align:center;
  max-width:560px;line-height:1.55;}
.intro b{color:var(--gold-soft);}

.grid{display:grid;gap:22px;width:100%;max-width:1300px;
  grid-template-columns:repeat(auto-fit,minmax(380px,1fr));}

.variant{display:flex;flex-direction:column;border-radius:22px;overflow:hidden;
  border:1px solid rgba(212,168,108,.18);background:linear-gradient(170deg,#1a050d,#0e0306);
  box-shadow:0 14px 40px rgba(0,0,0,.5);}
.v-head{padding:14px 16px 10px;text-align:center;border-bottom:1px solid rgba(212,168,108,.12);}
.v-title{font-family:Georgia,serif;font-size:18px;color:var(--gold-soft);letter-spacing:.08em;
  text-transform:uppercase;margin:0 0 4px;}
.v-sub{font-family:Arial,sans-serif;font-size:11.5px;color:#b58a8a;font-style:italic;margin:0;}
.v-body{padding:16px 14px 20px;display:flex;flex-direction:column;gap:14px;}
.v-desc{font-family:Arial,sans-serif;font-size:11.5px;color:#a98;line-height:1.55;text-align:center;
  background:rgba(255,255,255,.02);border:1px solid rgba(212,168,108,.1);
  border-radius:9px;padding:8px 10px;}

.phone{background:linear-gradient(170deg,#180510,#0a0306);
  border:1px solid rgba(212,168,108,.12);border-radius:16px;padding:14px 14px 16px;}
.ptitle{font-size:24px;margin:0 0 2px;}
.psub{font-family:Arial,sans-serif;font-size:12.5px;color:#b89aa2;margin:0 0 14px;line-height:1.5;}

/* picker condiviso (chip) */
.picker{display:flex;gap:8px;justify-content:center;margin:0 0 14px;}
.chip{flex:1;max-width:120px;border:1px solid rgba(212,168,108,.28);background:rgba(0,0,0,.3);
  border-radius:13px;padding:9px 6px;text-align:center;cursor:pointer;transition:.22s;user-select:none;
  font-family:Arial,sans-serif;color:rgba(243,217,176,.55);display:flex;flex-direction:column;
  align-items:center;gap:3px;}
.chip .ce{font-size:18px;line-height:1;}
.chip .ct{font-size:10px;letter-spacing:.08em;text-transform:uppercase;}
.chip.on{border-color:var(--gold);
  background:linear-gradient(180deg,rgba(212,168,108,.22),rgba(212,168,108,.06));
  color:var(--gold);}

/* tasto Tira condiviso */
.tira{appearance:none;border:none;cursor:pointer;width:100%;
  background:linear-gradient(180deg,var(--gold-soft),var(--gold) 55%,var(--gold-dim));
  color:#3a2405;font-family:Georgia,serif;font-size:16px;letter-spacing:.18em;
  text-transform:uppercase;font-weight:700;padding:14px;border-radius:13px;
  box-shadow:0 8px 20px rgba(212,168,108,.3),inset 0 1px 0 rgba(255,255,255,.4);
  transition:.18s;}
.tira:active{transform:translateY(2px);box-shadow:0 4px 12px rgba(212,168,108,.25);}
.tira:disabled{opacity:.5;cursor:not-allowed;}

/* result */
.result{font-family:Georgia,serif;text-align:center;margin-top:10px;min-height:42px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  opacity:0;transition:opacity .35s;}
.result.show{opacity:1;}
.result .emos{font-size:24px;letter-spacing:6px;}
.result .frase{font-size:14.5px;color:var(--cream);font-style:italic;}

/* ===========================================================
   VARIANTE A · CASINÒ VINTAGE
   cornice dorata, finestre rettangolari, rulli scorrono verticali
   =========================================================== */
.va .slot-machine{background:linear-gradient(180deg,#3a1010 0%,#1a0508 100%);
  border:3px solid;border-image:linear-gradient(140deg,var(--gold-soft),var(--gold-dim),var(--gold-soft)) 1;
  border-radius:14px;padding:18px 14px 16px;position:relative;
  box-shadow:inset 0 0 30px rgba(0,0,0,.6),0 6px 22px rgba(0,0,0,.5);margin:0 0 14px;}
.va .slot-machine::before{content:"";position:absolute;inset:6px;border:1px solid rgba(212,168,108,.25);
  border-radius:9px;pointer-events:none;}
.va .reels{display:flex;gap:6px;justify-content:center;}
.va .reel{flex:1;height:120px;background:linear-gradient(180deg,#0a0205,#1a0610);
  border:2px solid var(--gold-dim);border-radius:8px;overflow:hidden;position:relative;
  box-shadow:inset 0 8px 18px rgba(0,0,0,.7);}
.va .reel-strip{display:flex;flex-direction:column;align-items:center;
  transition:transform 1.2s cubic-bezier(.17,.67,.18,1);}
.va .reel-face{height:120px;width:100%;display:flex;flex-direction:column;align-items:center;
  justify-content:center;flex-shrink:0;}
.va .reel-face .e{font-size:34px;line-height:1;}
.va .reel-face .t{font-size:9.5px;color:var(--gold-soft);text-transform:uppercase;
  letter-spacing:.08em;margin-top:4px;font-family:Arial,sans-serif;}
.va .reel.spinning .reel-strip{transition:none;animation:spinA .12s linear infinite;}
@keyframes spinA{from{transform:translateY(0);}to{transform:translateY(-120px);}}
.va .machine-title{position:absolute;top:-13px;left:50%;transform:translateX(-50%);
  background:linear-gradient(180deg,var(--gold-soft),var(--gold));color:#3a2405;
  font-family:Georgia,serif;font-size:11px;letter-spacing:.3em;text-transform:uppercase;
  padding:3px 16px;border-radius:6px;font-weight:700;}

/* ===========================================================
   VARIANTE B · VELLUTO LUSSURIA
   pannello velluto, rouleau con vetri appena visibili
   =========================================================== */
.vb .slot-machine{background:radial-gradient(120% 90% at 50% 25%,#5c1026 0%,#160409 80%);
  border:1px solid rgba(212,168,108,.3);border-radius:18px;padding:18px 16px;
  box-shadow:inset 0 0 35px rgba(0,0,0,.55),0 8px 24px rgba(0,0,0,.5);margin:0 0 14px;
  position:relative;}
.vb .slot-machine::before{content:"";position:absolute;inset:0;border-radius:18px;pointer-events:none;
  background:repeating-radial-gradient(circle at 30% 25%,rgba(212,168,108,.04) 0 2px,transparent 2px 5px);
  mix-blend-mode:overlay;}
.vb .reels{display:flex;gap:10px;justify-content:center;}
.vb .reel{flex:1;height:110px;background:linear-gradient(180deg,rgba(0,0,0,.55),rgba(0,0,0,.25));
  border:1px solid rgba(212,168,108,.2);border-radius:11px;overflow:hidden;position:relative;
  box-shadow:inset 0 4px 14px rgba(0,0,0,.55);}
.vb .reel::before{content:"";position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(180deg,rgba(0,0,0,.45) 0%,transparent 25%,transparent 75%,rgba(0,0,0,.45) 100%);}
.vb .reel-strip{display:flex;flex-direction:column;align-items:center;
  transition:transform 1.3s cubic-bezier(.2,.7,.2,1);}
.vb .reel-face{height:110px;width:100%;display:flex;flex-direction:column;align-items:center;
  justify-content:center;flex-shrink:0;gap:2px;}
.vb .reel-face .e{font-size:32px;line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5));}
.vb .reel-face .t{font-size:10px;color:var(--cream);font-style:italic;text-align:center;
  padding:0 4px;font-family:Georgia,serif;opacity:.85;}
.vb .reel.spinning .reel-strip{transition:none;animation:spinB .08s linear infinite;filter:blur(1.5px);}
@keyframes spinB{from{transform:translateY(0);}to{transform:translateY(-110px);}}

/* ===========================================================
   VARIANTE C · CARTE GRIMOIRE
   nessuna cornice "macchina", 3 colonne di carte che scorrono
   =========================================================== */
.vc .slot-machine{padding:6px 0 14px;margin:0 0 14px;display:flex;flex-direction:column;align-items:center;gap:10px;}
.vc .reels{display:flex;gap:8px;justify-content:center;width:100%;position:relative;}
.vc .reels::before,.vc .reels::after{content:"";position:absolute;left:0;right:0;height:18px;
  pointer-events:none;z-index:2;}
.vc .reels::before{top:0;background:linear-gradient(180deg,#0a0306 0%,transparent 100%);}
.vc .reels::after{bottom:0;background:linear-gradient(0deg,#0a0306 0%,transparent 100%);}
.vc .reel{flex:1;height:130px;overflow:hidden;position:relative;border-radius:10px;
  background:linear-gradient(180deg,rgba(212,168,108,.05),rgba(0,0,0,.2));
  border:1px solid rgba(212,168,108,.15);}
.vc .reel-strip{display:flex;flex-direction:column;align-items:center;
  transition:transform 1.5s cubic-bezier(.16,.84,.32,1);}
.vc .reel-face{height:130px;width:100%;display:flex;flex-direction:column;align-items:center;
  justify-content:center;flex-shrink:0;gap:6px;padding:6px;}
.vc .reel-face .e{font-size:36px;line-height:1;}
.vc .reel-face .t{font-size:10.5px;color:var(--gold-soft);font-family:Georgia,serif;
  font-style:italic;text-align:center;letter-spacing:.04em;}
.vc .reel.spinning .reel-strip{transition:none;animation:spinC .06s linear infinite;filter:blur(2.5px);}
@keyframes spinC{from{transform:translateY(0);}to{transform:translateY(-130px);}}
.vc .reel-label{font-family:Arial,sans-serif;font-size:9.5px;color:var(--gold-dim);
  letter-spacing:.18em;text-transform:uppercase;text-align:center;margin-top:6px;}
.vc .reel-labels{display:flex;gap:8px;width:100%;}
.vc .reel-labels > div{flex:1;text-align:center;}

/* footer scelta */
.pickbar{display:flex;justify-content:center;}
.btn-pick{appearance:none;border:1px solid rgba(212,168,108,.4);
  background:rgba(212,168,108,.08);color:var(--cream);font-family:Arial,sans-serif;font-size:12px;
  letter-spacing:.1em;text-transform:uppercase;padding:9px 14px;border-radius:10px;cursor:pointer;
  transition:.2s;}
.btn-pick:hover{background:rgba(212,168,108,.18);border-color:var(--gold);color:var(--gold);}
</style>
</head>
<body>

<div class="intro">
  Cambio direzione: il gioco <b>Dadi</b> diventa <b>🎰 Slot</b> con la stessa logica
  (3 rulli = Azione · Corpo · Dove, picker per attivarli, "Tira", frase composta).<br>
  Tre estetiche per la macchina. Clicca <b>Tira</b> in ogni mockup per vederla girare.
</div>

<div class="grid" id="grid"></div>

<script>
const FACCE = {
  az: [{e:'💋',t:'Bacia'},{e:'👅',t:'Lecca'},{e:'🫦',t:'Mordi'},{e:'💆',t:'Massaggia'},{e:'✋',t:'Sfiora'},{e:'💨',t:'Soffia su'}],
  co: [{e:'👄',t:'il collo'},{e:'👂',t:"l'orecchio"},{e:'🦵',t:"l'interno coscia"},{e:'🍑',t:'il lato B'},{e:'🫀',t:'il petto'},{e:'🤚',t:'la schiena'}],
  lu: [{e:'🛋️',t:'sul divano'},{e:'🚿',t:'sotto la doccia'},{e:'🍳',t:'in cucina'},{e:'🚗',t:'in macchina'},{e:'🛏️',t:'a letto'},{e:'🌃',t:'sul balcone'}],
};
const ORDER = ['az','co','lu'];
const CHIP = { az:'💋', co:'🫦', lu:'📍' };
const LABEL = { az:'Azione', co:'Corpo', lu:'Dove' };

const VARIANTS = [
  { id:'va', name:'A · Casinò Vintage', sub:'cornice dorata, finestre rettangolari',
    desc:'Cornice oro brunito, rulli con bordo metallico, scorrimento netto. Estetica "slot machine" classica.', face_h:120 },
  { id:'vb', name:'B · Velluto Lussuria', sub:'pannello velluto vino, vetri appena visibili',
    desc:'Coerente con il resto dell\'app: dominante vino, oro caldo, motion blur leggero, niente cromature.', face_h:110 },
  { id:'vc', name:'C · Carte Grimoire', sub:'no cornice macchina, solo 3 colonne di carte',
    desc:'Più editoriale: niente "macchina", tre colonne che scorrono come carte dal grimoire. Sfumature ai bordi.', face_h:130 },
];

function el(tag, cls, txt){
  const n = document.createElement(tag);
  if (cls) n.className = cls;
  if (txt != null) n.textContent = txt;
  return n;
}

function buildPicker(state, onChange){
  const wrap = el('div', 'picker');
  for (const k of ORDER){
    const c = el('div', 'chip' + (state[k] ? ' on' : ''));
    c.appendChild(el('span', 'ce', CHIP[k]));
    c.appendChild(el('span', 'ct', LABEL[k]));
    c.onclick = () => {
      const active = ORDER.filter(x => state[x]).length;
      if (state[k] && active === 1) return;
      state[k] = !state[k];
      onChange();
    };
    wrap.appendChild(c);
  }
  return wrap;
}

function buildReel(faces, faceH){
  const reel = el('div', 'reel');
  const strip = el('div', 'reel-strip');
  for (const f of faces){
    const cell = el('div', 'reel-face');
    cell.appendChild(el('div', 'e', f.e));
    cell.appendChild(el('div', 't', f.t));
    strip.appendChild(cell);
  }
  reel.appendChild(strip);
  reel._strip = strip;
  reel._faceH = faceH;
  return reel;
}

function buildMockup(V){
  const card = el('article', 'variant ' + V.id);

  const head = el('div', 'v-head');
  head.appendChild(el('h2', 'v-title', V.name));
  head.appendChild(el('p', 'v-sub', V.sub));
  card.appendChild(head);

  const body = el('div', 'v-body');
  const phone = el('div', 'phone');
  const title = el('h2', 'ptitle', '🎰 Slot');
  const sub = el('p', 'psub', 'Scegli i rulli e tira.');
  phone.appendChild(title);
  phone.appendChild(sub);

  const state = { az:true, co:true, lu:true };
  const machine = el('div', 'slot-machine');

  if (V.id === 'va'){
    const tag = el('div', 'machine-title', 'LUSSURIA');
    machine.appendChild(tag);
  }

  const reelsWrap = el('div', 'reels');
  machine.appendChild(reelsWrap);

  if (V.id === 'vc'){
    const labels = el('div', 'reel-labels');
    for (const k of ORDER){
      const l = el('div', 'reel-label', LABEL[k]);
      l.dataset.key = k;
      labels.appendChild(l);
    }
    phone.appendChild(machine);
    phone.appendChild(labels);
  } else {
    phone.appendChild(machine);
  }

  const reels = {};
  function rebuildReels(){
    reelsWrap.replaceChildren();
    if (V.id === 'vc'){
      const labelsDiv = phone.querySelector('.reel-labels');
      if (labelsDiv){
        for (const child of labelsDiv.children){
          child.style.opacity = state[child.dataset.key] ? '1' : '.25';
        }
      }
    }
    for (const k of ORDER){
      if (!state[k]) continue;
      const r = buildReel(FACCE[k], V.face_h);
      reelsWrap.appendChild(r);
      reels[k] = r;
    }
  }

  const tira = el('button', 'tira', 'Tira');
  const result = el('div', 'result');
  const emos = el('div', 'emos');
  const frase = el('div', 'frase');
  result.appendChild(emos);
  result.appendChild(frase);

  tira.onclick = () => {
    if (tira.disabled) return;
    tira.disabled = true;
    result.classList.remove('show');
    const picks = {};
    const activeKeys = ORDER.filter(k => state[k]);
    for (const k of activeKeys){
      picks[k] = Math.floor(Math.random()*6);
      const r = reels[k];
      r.classList.add('spinning');
      r._strip.style.transform = 'translateY(0)';
    }
    activeKeys.forEach((k, idx) => {
      setTimeout(() => {
        const r = reels[k];
        r.classList.remove('spinning');
        r._strip.style.transform = 'translateY(' + (-picks[k] * V.face_h) + 'px)';
      }, 600 + idx*250);
    });
    setTimeout(() => {
      const eList = [], rest = [];
      let act = '';
      for (const k of ORDER){
        if (picks[k] == null) continue;
        const f = FACCE[k][picks[k]];
        eList.push(f.e);
        if (k === 'az') act = f.t; else rest.push(f.t);
      }
      if (!act) act = rest.shift() || '';
      emos.textContent = eList.join(' ');
      frase.textContent = act + (rest.length ? ' ' + rest.join(' ') : '');
      result.classList.add('show');
      tira.disabled = false;
    }, 600 + (activeKeys.length-1)*250 + 1300);
  };

  const picker = buildPicker(state, () => { rebuildReels(); });
  phone.insertBefore(picker, machine);
  rebuildReels();
  phone.appendChild(tira);
  phone.appendChild(result);

  body.appendChild(phone);
  body.appendChild(el('p', 'v-desc', V.desc));

  const pickbar = el('div', 'pickbar');
  const btn = el('button', 'btn-pick', 'Scegli ' + V.name.split('·')[0].trim());
  btn.onclick = () => {
    document.querySelectorAll('.btn-pick').forEach(b => b.style.background = 'rgba(212,168,108,.08)');
    btn.style.background = 'var(--gold)';
    btn.style.color = '#3a2405';
    alert('Scelta: ' + V.name);
  };
  pickbar.appendChild(btn);
  body.appendChild(pickbar);

  card.appendChild(body);
  return card;
}

const grid = document.getElementById('grid');
VARIANTS.forEach(V => grid.appendChild(buildMockup(V)));
</script>

</body>
</html>
