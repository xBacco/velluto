<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Ruota E · Hello Sun (70s Polaroid)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-1: #f0d8a8;   /* crema sole */
    --bg-2: #e8c890;
    --fg:   #3a1a08;
    --muted:#7a4a28;

    --orange-1: #d4642a;
    --orange-2: #b34a18;
    --mustard:  #c89a3a;
    --terra:    #a85530;
    --cream:    #f4e0c4;
    --brown:    #5a3520;

    --rare:  #e87a7a;   /* rosa salmone vivo */
    --ultra: #6a8a4a;   /* verde avocado */
  }
  * { box-sizing: border-box; }
  html, body {
    margin:0; padding:0;
    background:
      radial-gradient(ellipse at top, var(--bg-1), var(--bg-2) 70%),
      var(--bg-1);
    color:var(--fg);
    font-family:'Inter', sans-serif;
    min-height:100vh;
  }
  body { padding:36px 16px 80px; }

  /* Pattern soli decorativi sullo sfondo */
  body::before {
    content:'';
    position:fixed; inset:0;
    background-image:
      radial-gradient(circle at 20% 20%, var(--mustard) 1px, transparent 2px),
      radial-gradient(circle at 80% 60%, var(--terra) 1px, transparent 2px),
      radial-gradient(circle at 50% 90%, var(--orange-1) 1px, transparent 2px);
    background-size: 60px 60px, 80px 80px, 100px 100px;
    opacity:0.15;
    pointer-events:none;
  }

  header { text-align:center; max-width:560px; margin:0 auto 30px; position:relative; }
  h1 {
    font-family:'Pacifico', cursive;
    font-size:48px;
    margin:0;
    color:var(--orange-2);
    text-shadow:
      3px 3px 0 var(--mustard),
      6px 6px 0 var(--brown);
    transform:rotate(-3deg);
  }
  header .sub {
    font-family:'DM Serif Display', serif;
    font-style:italic;
    font-size:14px;
    color:var(--brown);
    margin-top:8px;
    letter-spacing:0.08em;
  }

  .stage { max-width:380px; margin:0 auto; }

  .wheel-wrap {
    position:relative;
    width:340px;
    height:340px;
    margin:0 auto;
    filter:drop-shadow(0 12px 24px rgba(90,53,32,0.35));
  }

  /* Puntatore — goccia anni 70 */
  .pointer {
    position:absolute;
    top:-6px; left:50%;
    transform:translateX(-50%);
    width:24px; height:32px;
    z-index:10;
  }
  .pointer::before {
    content:'';
    position:absolute; inset:0;
    background:linear-gradient(180deg, var(--orange-2), var(--brown));
    clip-path:polygon(50% 100%, 10% 30%, 30% 0, 70% 0, 90% 30%);
    border-radius:6px;
  }
  .pointer::after {
    content:'';
    position:absolute; top:6px; left:50%;
    width:6px; height:10px;
    margin-left:-3px;
    background:rgba(255,220,180,0.5);
    border-radius:50%;
    filter:blur(1px);
  }

  /* Anello con scallop / petali */
  .ring {
    position:absolute; inset:-6px;
    border-radius:50%;
    background:repeating-conic-gradient(from 0deg,
      var(--orange-1) 0deg 15deg,
      var(--cream) 15deg 30deg);
    -webkit-mask: radial-gradient(circle, transparent 0 calc(50% - 14px), black calc(50% - 14px));
            mask: radial-gradient(circle, transparent 0 calc(50% - 14px), black calc(50% - 14px));
    z-index:2;
    pointer-events:none;
  }

  /* Cornice marrone della ruota */
  .frame {
    position:absolute; inset:6px;
    border-radius:50%;
    background:var(--brown);
    z-index:1;
    box-shadow:inset 0 0 0 2px var(--orange-2);
  }

  /* Ruota */
  .wheel {
    position:absolute; inset:14px;
    border-radius:50%;
    overflow:hidden;
    transition:transform 4.5s cubic-bezier(0.17, 0.67, 0.16, 0.99);
    cursor:pointer;
    box-shadow:inset 0 0 0 2px var(--cream);
    z-index:3;
  }
  .wheel.spinning { cursor:not-allowed; }

  .emoji {
    position:absolute;
    top:50%; left:50%;
    width:42px; height:42px;
    margin:-21px 0 0 -21px;
    display:flex; align-items:center; justify-content:center;
    font-size:24px;
    line-height:1;
    pointer-events:none;
    font-family:'Segoe UI Emoji','Apple Color Emoji','Noto Color Emoji',sans-serif;
    z-index:5;
    text-shadow:0 1px 2px rgba(58,26,8,0.5);
  }
  .emoji.rare {
    font-size:17px;
    width:28px; height:28px;
    margin:-14px 0 0 -14px;
    filter:drop-shadow(0 0 6px var(--rare));
  }
  .emoji.ultra {
    font-size:17px;
    width:28px; height:28px;
    margin:-14px 0 0 -14px;
    filter:drop-shadow(0 0 6px var(--ultra));
  }

  /* Hub centrale — sole */
  .hub {
    position:absolute;
    top:50%; left:50%;
    width:60px; height:60px;
    margin:-30px 0 0 -30px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #fff8d0, var(--mustard) 50%, var(--orange-2));
    box-shadow:
      0 0 0 3px var(--cream),
      0 0 0 5px var(--brown),
      0 4px 10px rgba(58,26,8,0.4);
    z-index:6;
    display:flex; align-items:center; justify-content:center;
    font-size:24px;
  }
  /* Raggi del sole attorno all'hub */
  .hub::before, .hub::after {
    content:'';
    position:absolute;
    inset:-12px;
    border-radius:50%;
    background:
      conic-gradient(from 0deg,
        var(--mustard) 0deg 4deg, transparent 4deg 30deg,
        var(--mustard) 30deg 34deg, transparent 34deg 60deg,
        var(--mustard) 60deg 64deg, transparent 64deg 90deg,
        var(--mustard) 90deg 94deg, transparent 94deg 120deg,
        var(--mustard) 120deg 124deg, transparent 124deg 150deg,
        var(--mustard) 150deg 154deg, transparent 154deg 180deg,
        var(--mustard) 180deg 184deg, transparent 184deg 210deg,
        var(--mustard) 210deg 214deg, transparent 214deg 240deg,
        var(--mustard) 240deg 244deg, transparent 244deg 270deg,
        var(--mustard) 270deg 274deg, transparent 274deg 300deg,
        var(--mustard) 300deg 304deg, transparent 304deg 330deg,
        var(--mustard) 330deg 334deg, transparent 334deg 360deg);
    -webkit-mask: radial-gradient(circle, transparent 0 calc(50% - 12px), black calc(50% - 12px) calc(50% - 2px), transparent calc(50% - 2px));
            mask: radial-gradient(circle, transparent 0 calc(50% - 12px), black calc(50% - 12px) calc(50% - 2px), transparent calc(50% - 2px));
    z-index:-1;
    opacity:0.7;
  }

  .controls { margin-top:32px; text-align:center; }
  .spin-btn {
    background:linear-gradient(180deg, var(--orange-1), var(--orange-2));
    border:3px solid var(--cream);
    color:var(--cream);
    padding:14px 38px;
    border-radius:30px;
    font-family:'Pacifico', cursive;
    font-size:22px;
    cursor:pointer;
    box-shadow:
      0 0 0 2px var(--brown),
      0 8px 0 var(--brown),
      0 10px 18px rgba(58,26,8,0.3);
    transition:all 0.15s;
    transform:rotate(-2deg);
  }
  .spin-btn:active {
    transform:rotate(-2deg) translateY(4px);
    box-shadow:0 0 0 2px var(--brown), 0 4px 0 var(--brown), 0 6px 12px rgba(58,26,8,0.3);
  }
  .spin-btn:disabled { opacity:0.5; cursor:not-allowed; }

  .result {
    margin-top:32px;
    min-height:96px;
    padding:18px;
    background:var(--cream);
    border:3px solid var(--brown);
    border-radius:8px;
    box-shadow:0 6px 0 var(--brown), 0 8px 16px rgba(58,26,8,0.2);
    text-align:center;
    opacity:0;
    transform:translateY(8px) rotate(-1deg);
    transition:opacity 0.4s, transform 0.4s;
  }
  .result.on { opacity:1; transform:translateY(0) rotate(-1deg); }
  .result .lab {
    font-family:'DM Serif Display', serif;
    font-style:italic;
    font-size:14px;
    color:var(--terra);
    margin-bottom:4px;
  }
  .result .prize {
    font-family:'Pacifico', cursive;
    font-size:26px;
    color:var(--orange-2);
  }
  .result .prize .em { font-family:sans-serif; font-size:30px; margin-right:8px; vertical-align:middle; }
  .result .sub { font-family:'DM Serif Display', serif; font-style:italic; font-size:13px; color:var(--brown); margin-top:6px; }
</style>
</head>
<body>

<header>
  <h1>Hello Sun</h1>
  <div class="sub">Stile E · 70s Polaroid</div>
</header>

<div class="stage">
  <div class="wheel-wrap">
    <div class="pointer"></div>
    <div class="ring"></div>
    <div class="frame"></div>
    <div class="wheel" id="wheel"></div>
    <div class="hub">☀</div>
  </div>

  <div class="controls">
    <button class="spin-btn" id="spin">Spin baby!</button>
  </div>

  <div class="result" id="result">
    <div class="lab">Ti è uscito…</div>
    <div class="prize"><span class="em" id="resEm">·</span><span id="resLbl">—</span></div>
    <div class="sub" id="resSub"></div>
  </div>
</div>

<script>
  const SET = [
    { e:'💋', k:'segreto',   l:'Apri un segreto',    sub:'Apri una busta segreta',                     w:1 },
    { e:'🔥', k:'piccante',  l:'Piccante',           sub:'Una proposta piccante da provare stasera',   w:1 },
    { e:'💌', k:'desiderio', l:'Pesca una fantasia', sub:'Dalla bacheca delle cose da provare',        w:1 },
    { e:'🧣', k:'bendare',   l:'Bendare',            sub:'X minuti bendato/a, l\'altro decide',        w:1 },
    { e:'🃏', k:'wild',      l:'Carta wild',         sub:'L\'altro/a decide cosa farti per 24h',       w:1 },
    { e:'💆', k:'massaggio', l:'Massaggio',          sub:'10 minuti, dove preferisce chi ha vinto',    w:1 },
    { e:'✖️', k:'doppio',    l:'Prossimo x2',        sub:'Il prossimo premio vale doppio',             w:0.5, rare:'rare' },
    { e:'📸', k:'polaroid',  l:'Foto osè 24h',       sub:'Inviane una al partner entro 24 ore',        w:1 },
    { e:'🎟️', k:'lampo',    l:'Buono lampo',        sub:'Un buono pescato a sorpresa, vale 24h',      w:1 },
    { e:'👅', k:'orale',     l:'Servizio orale',     sub:'Quando vuole chi ha vinto',                  w:1 },
    { e:'🔁', k:'ancora',    l:'Gira ancora',        sub:'Tiro extra concesso',                        w:1 },
    { e:'⭐', k:'jolly',     l:'Jolly',              sub:'Scegli tu il premio',                        w:1 },
    { e:'💎', k:'jackpot',   l:'Jackpot',            sub:'Uno spicchio a testa: 2 premi totali',       w:0.5, rare:'ultra' },
  ];

  const NORMAL_COLORS = ['var(--orange-1)','var(--mustard)','var(--terra)','var(--cream)'];
  const COLOR_RARE = 'var(--rare)';
  const COLOR_ULTRA = 'var(--ultra)';

  const wheelEl  = document.getElementById('wheel');
  const spinBtn  = document.getElementById('spin');
  const resEl    = document.getElementById('result');
  const resEm    = document.getElementById('resEm');
  const resLbl   = document.getElementById('resLbl');
  const resSub   = document.getElementById('resSub');

  const sumW = SET.reduce((s,x)=>s+x.w, 0);
  const degPerUnit = 360 / sumW;
  const slice0 = SET[0].w * degPerUnit;

  function colorsFor(set) {
    let nIdx = 0;
    return set.map(item => {
      if (item.rare === 'rare')  return COLOR_RARE;
      if (item.rare === 'ultra') return COLOR_ULTRA;
      const c = NORMAL_COLORS[nIdx % NORMAL_COLORS.length];
      nIdx++;
      return c;
    });
  }
  const COLORS = colorsFor(SET);

  (function build() {
    const stops = [];
    let acc = 0;
    for (let i = 0; i < SET.length; i++) {
      const slice = SET[i].w * degPerUnit;
      stops.push(`${COLORS[i]} ${acc.toFixed(4)}deg ${(acc+slice).toFixed(4)}deg`);
      acc += slice;
    }
    const startOffset = (-90 - slice0/2).toFixed(4);
    wheelEl.style.background = `conic-gradient(from ${startOffset}deg, ${stops.join(', ')})`;

    // dividers marroni spessi
    acc = 0;
    for (let i = 0; i < SET.length; i++) {
      const slice = SET[i].w * degPerUnit;
      acc += slice;
      const boundaryTop = acc - slice0/2;
      const d = document.createElement('div');
      d.style.cssText = `position:absolute;top:50%;left:50%;width:2.5px;height:158px;background:var(--brown);transform-origin:top center;transform:translateX(-1.25px) rotate(${(boundaryTop+180).toFixed(4)}deg);pointer-events:none;z-index:3;`;
      wheelEl.appendChild(d);
    }

    // emoji
    const R = 124;
    acc = 0;
    for (let i = 0; i < SET.length; i++) {
      const item = SET[i];
      const slice = item.w * degPerUnit;
      const center = acc + slice/2;
      const angTop = center - slice0/2;
      const rad = (angTop - 90) * Math.PI / 180;
      const x = Math.cos(rad) * R;
      const y = Math.sin(rad) * R;
      const em = document.createElement('div');
      em.className = 'emoji ' + (item.rare || '');
      em.textContent = item.e;
      em.style.transform = `translate(${x}px, ${y}px)`;
      wheelEl.appendChild(em);
      acc += slice;
    }
  })();

  let spinning = false;
  let totalRotation = 0;

  function spin() {
    if (spinning) return;
    spinning = true;
    wheelEl.classList.add('spinning');
    spinBtn.disabled = true;
    resEl.classList.remove('on');

    let r = Math.random() * sumW;
    let chosen = 0;
    for (let i = 0; i < SET.length; i++) {
      r -= SET[i].w;
      if (r <= 0) { chosen = i; break; }
    }

    let acc = 0;
    for (let i = 0; i < chosen; i++) acc += SET[i].w * degPerUnit;
    const sliceChosen = SET[chosen].w * degPerUnit;
    const chosenCenterFromTop = acc + sliceChosen/2 - slice0/2;

    const turns = 5 + Math.floor(Math.random()*3);
    const target = turns * 360 + (360 - chosenCenterFromTop);
    totalRotation += target;
    wheelEl.style.transform = `rotate(${totalRotation}deg)`;

    setTimeout(() => {
      spinning = false;
      wheelEl.classList.remove('spinning');
      spinBtn.disabled = false;
      const item = SET[chosen];
      resEm.textContent  = item.e;
      resLbl.textContent = item.l;
      resSub.textContent = item.sub;
      resEl.classList.add('on');
    }, 4700);
  }

  spinBtn.addEventListener('click', spin);
  wheelEl.addEventListener('click', spin);
</script>
</body>
</html>
