<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Intro · Nodo dorato</title>
<style>
:root{
  --bg:#160409; --bg2:#2a0813; --wine:#5c1026; --wine2:#7a1533;
  --wine-deep:#3d0a1a; --gold:#d4a86c; --gold-soft:#e9c98f; --cream:#f3d9b0;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#000;
  font-family:Georgia,"Times New Roman",serif;color:var(--cream);}

.stage{position:fixed;inset:0;overflow:hidden;cursor:pointer;
  background:radial-gradient(120% 70% at 50% -5%,#3d0a1a 0,transparent 55%),
             linear-gradient(170deg,var(--bg),var(--bg2));}

.reveal{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;z-index:5;
  opacity:0;transition:opacity 1s ease 1.2s;}
.stage.open .reveal{opacity:1;}
.candle{font-size:54px;filter:drop-shadow(0 0 22px rgba(212,168,108,.55));
  animation:flick 3s ease-in-out infinite;}
@keyframes flick{0%,100%{opacity:1}50%{opacity:.85}}
.kick{letter-spacing:.5em;text-transform:uppercase;font-size:11px;color:var(--gold);
  margin-top:18px;font-family:Arial,Helvetica,sans-serif;}
.title{font-size:46px;margin-top:6px;
  background:linear-gradient(180deg,var(--cream),var(--gold-soft));
  -webkit-background-clip:text;background-clip:text;color:transparent;}

/* tende che si sovrappongono di poco al centro */
.curtain{position:absolute;top:0;bottom:0;width:55%;z-index:20;
  transform-origin:top center;
  transition: transform 2s cubic-bezier(.4,.0,.2,1) .55s;
  background:
    repeating-linear-gradient(91deg,
      rgba(0,0,0,.55) 0 5px,
      rgba(0,0,0,0) 18px,
      rgba(255,255,255,.06) 30px,
      rgba(0,0,0,0) 42px,
      rgba(0,0,0,.55) 56px),
    linear-gradient(180deg,var(--wine2) 0%, var(--wine) 35%, var(--wine-deep) 100%);
  box-shadow: inset 0 0 90px rgba(0,0,0,.55);
}
.curtain.left{left:0;border-right:1px solid rgba(0,0,0,.6);}
.curtain.right{right:0;border-left:1px solid rgba(0,0,0,.6);}

/* "respiro" sottile pre-apertura */
.curtain.left{animation: breatheL 3.2s ease-in-out infinite;}
.curtain.right{animation: breatheR 3.2s ease-in-out infinite;}
@keyframes breatheL{0%,100%{transform:rotateZ(0)} 50%{transform:rotateZ(.25deg)}}
@keyframes breatheR{0%,100%{transform:rotateZ(0)} 50%{transform:rotateZ(-.25deg)}}

/* nodo al centro: cordone + nappa dorata */
.knot{position:absolute;left:50%;top:42%;transform:translate(-50%,-50%);
  z-index:30;width:120px;height:140px;pointer-events:none;
  transition: transform 1s cubic-bezier(.5,-.2,.7,1.4), opacity .5s ease .8s;}
.cord-l, .cord-r{position:absolute;top:30px;width:60px;height:8px;border-radius:8px;
  background:linear-gradient(180deg,var(--gold-soft),var(--gold) 50%,#8a6a36);
  box-shadow:0 2px 4px rgba(0,0,0,.5);}
.cord-l{left:-10px;transform-origin:right center;transform:rotate(-18deg);}
.cord-r{right:-10px;transform-origin:left center;transform:rotate(18deg);}
.knot-c{position:absolute;left:50%;top:18px;transform:translateX(-50%);
  width:34px;height:34px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%, var(--gold-soft), var(--gold) 55%,#6f5021);
  box-shadow:0 4px 8px rgba(0,0,0,.6), inset 0 0 6px rgba(0,0,0,.3);}
.knot-c::after{content:"";position:absolute;inset:6px;border-radius:50%;
  border:1px solid rgba(255,255,255,.25);}
.tassel{position:absolute;left:50%;top:52px;transform:translateX(-50%);
  width:18px;height:60px;border-radius:3px 3px 9px 9px;
  background:linear-gradient(180deg,var(--gold-soft),var(--gold) 40%,#8a6a36);
  box-shadow:0 6px 8px rgba(0,0,0,.55);
  animation: swing 2.6s ease-in-out infinite;transform-origin:top center;}
@keyframes swing{
  0%,100%{transform:translateX(-50%) rotate(-3deg);}
  50%{transform:translateX(-50%) rotate(3deg);}
}

/* apertura: nodo ruota → cade → tende cedono */
.stage.open .knot{
  transform:translate(-50%,-50%) rotate(540deg) translateY(160px) scale(.6);
  opacity:0;
}
.stage.open .curtain{animation:none;}
.stage.open .curtain.left{
  transform: translateX(-104%) rotateZ(-3deg);
  transition-timing-function: cubic-bezier(.65,.02,.3,1);
}
.stage.open .curtain.right{
  transform: translateX(104%) rotateZ(3deg);
  transition-timing-function: cubic-bezier(.65,.02,.3,1);
}

.hint{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);z-index:50;
  font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:rgba(243,217,176,.45);
  font-family:Arial,Helvetica,sans-serif;pointer-events:none;}
</style>
</head>
<body>
<div class="stage" id="stage">
  <div class="reveal">
    <div class="candle">🕯️</div>
    <div class="kick">il nostro spazio</div>
    <div class="title">Lussuria</div>
  </div>
  <div class="curtain left"></div>
  <div class="curtain right"></div>
  <div class="knot">
    <div class="cord-l"></div>
    <div class="cord-r"></div>
    <div class="knot-c"></div>
    <div class="tassel"></div>
  </div>
  <div class="hint">tap per riavviare</div>
</div>
<script>
const stage = document.getElementById('stage');
function play(){
  stage.classList.remove('open');
  void stage.offsetWidth;
  setTimeout(()=>stage.classList.add('open'), 500);
}
stage.addEventListener('click', play);
window.addEventListener('load', ()=> setTimeout(play, 350));
</script>
</body>
</html>
