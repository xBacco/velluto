<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Ruota — 💎 jackpot flow</title>
<style>
  :root {
    --bg:#160409; --bg2:#2a0813;
    --wine:#5c1026; --wine2:#7a1533;
    --gold:#d4a86c; --gold-soft:#e9c98f; --cream:#f3d9b0; --rose:#c2557a;
    --sapphire:#3a6fc7;
    --muted:#9c7f88;
    --spin: cubic-bezier(.17,.67,.16,.99);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;font-family:Georgia,serif;color:var(--cream);
    background:radial-gradient(120% 70% at 50% -5%, #3d0a1a 0, transparent 55%),linear-gradient(170deg,var(--bg),var(--bg2));
    background-attachment:fixed;min-height:100vh;}
  body{padding:24px 16px 80px;}

  header{text-align:center;max-width:560px;margin:0 auto 14px;}
  h1{font-size:14px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin:0;font-family:Arial,sans-serif;}
  header .sub{font-size:11px;color:var(--muted);margin-top:6px;font-family:Arial,sans-serif;letter-spacing:.08em;line-height:1.5;}

  .steps-track{max-width:340px;margin:18px auto 8px;display:flex;justify-content:space-between;gap:6px;font-family:Arial,sans-serif;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);}
  .steps-track .s{flex:1;text-align:center;padding-bottom:6px;border-bottom:2px solid rgba(212,168,108,.18);}
  .steps-track .s.cur{color:var(--gold-soft);border-color:var(--gold);}
  .steps-track .s.done{color:var(--cream);border-color:rgba(212,168,108,.55);}

  /* ruota */
  .wheel-wrap{position:relative;width:280px;height:280px;margin:14px auto 0;}
  .pointer{position:absolute;top:-6px;left:50%;transform:translateX(-50%);z-index:7;
    width:0;height:0;border-left:12px solid transparent;border-right:12px solid transparent;border-top:22px solid var(--gold-soft);
    filter:drop-shadow(0 2px 4px rgba(0,0,0,.7));}
  .wheel{position:absolute;inset:0;border-radius:50%;border:6px solid var(--gold);z-index:1;
    box-shadow:0 0 0 2px #2a0813,0 0 0 6px rgba(212,168,108,.35),0 12px 40px rgba(0,0,0,.65),inset 0 0 30px rgba(0,0,0,.5);
    transition:transform 4.2s var(--spin);background:radial-gradient(circle,#7a1533 55%,#5c1026 100%);}
  .wheel::after{
    content:"";position:absolute;inset:0;border-radius:50%;pointer-events:none;z-index:2;
    background:conic-gradient(from -15deg,
      rgba(233,201,143,.7) 0deg 0.3deg,
      transparent 0.3deg 29.7deg,   rgba(233,201,143,.7) 29.7deg 30.3deg,
      transparent 30.3deg 59.7deg,   rgba(233,201,143,.7) 59.7deg 60.3deg,
      transparent 60.3deg 89.7deg,   rgba(233,201,143,.7) 89.7deg 90.3deg,
      transparent 90.3deg 119.7deg,  rgba(233,201,143,.7) 119.7deg 120.3deg,
      transparent 120.3deg 149.7deg, rgba(233,201,143,.7) 149.7deg 150.3deg,
      transparent 150.3deg 179.7deg, rgba(233,201,143,.7) 179.7deg 180.3deg,
      transparent 180.3deg 194.7deg, rgba(233,201,143,.7) 194.7deg 195.3deg,
      transparent 195.3deg 224.7deg, rgba(233,201,143,.7) 224.7deg 225.3deg,
      transparent 225.3deg 254.7deg, rgba(233,201,143,.7) 254.7deg 255.3deg,
      transparent 255.3deg 284.7deg, rgba(233,201,143,.7) 284.7deg 285.3deg,
      transparent 285.3deg 314.7deg, rgba(233,201,143,.7) 314.7deg 315.3deg,
      transparent 315.3deg 344.7deg, rgba(233,201,143,.7) 344.7deg 345.3deg,
      transparent 345.3deg 359.7deg, rgba(233,201,143,.7) 359.7deg 360deg);
  }
  .winhi{position:absolute;inset:0;border-radius:50%;z-index:3;pointer-events:none;opacity:0;transition:opacity .3s;}
  .winhi.on{opacity:1;}
  .slice-lbl{position:absolute;inset:0;pointer-events:none;z-index:4;}
  .slice-lbl .in{position:absolute;top:50%;left:50%;width:0;height:0;transform-origin:0 0;}
  .slice-lbl .e{position:absolute;width:36px;height:36px;margin:-18px 0 0 -18px;
    display:flex;align-items:center;justify-content:center;font-size:22px;line-height:1;
    font-family:'Segoe UI Emoji','Apple Color Emoji',sans-serif;text-shadow:0 1px 3px rgba(0,0,0,.7);}
  .slice-lbl .e.rare{font-size:18px;filter:drop-shadow(0 0 6px var(--gold-soft));}
  .slice-lbl .e.ultra{font-size:18px;filter:drop-shadow(0 0 6px var(--rose));}
  .slice-lbl .e.dim{opacity:.28;filter:grayscale(.7);}
  .hub{position:absolute;top:50%;left:50%;width:44px;height:44px;margin:-22px 0 0 -22px;z-index:5;
    display:grid;place-items:center;font-size:34px;line-height:1;
    font-family:'Segoe UI Emoji','Apple Color Emoji','Noto Color Emoji',sans-serif;
    text-shadow:0 2px 6px rgba(0,0,0,.7);}

  /* avatars */
  .turn-tag{display:flex;align-items:center;justify-content:center;gap:8px;font-family:Arial,sans-serif;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-soft);margin:14px 0 0;}
  .turn-tag .av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;
    background:radial-gradient(circle at 30% 30%,#3a1622,#1c0610);border:1px solid rgba(212,168,108,.45);}

  /* spin button */
  .ruota-spin{appearance:none;cursor:pointer;font-family:Arial,sans-serif;
    margin:22px auto 0;display:flex;max-width:340px;width:calc(100% - 32px);
    min-height:52px;border-radius:13px;align-items:center;justify-content:center;gap:10px;
    background:transparent;border:1px solid rgba(212,168,108,.45);
    color:var(--gold-soft);font-size:14px;letter-spacing:.1em;text-transform:uppercase;}
  .ruota-spin.solid{background:linear-gradient(180deg,var(--wine2),var(--wine));border-color:var(--gold-soft);color:var(--cream);}
  .ruota-spin:disabled{opacity:.5;cursor:not-allowed;}

  /* reveal overlay */
  .reveal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;
    background:rgba(8,2,5,.7);backdrop-filter:blur(2px);z-index:50;}
  .reveal.show{display:flex;}
  .reveal .stage{position:relative;display:flex;align-items:center;justify-content:center;}
  .beam{position:absolute;top:40px;left:50%;width:14px;height:340px;transform:translateX(-50%);transform-origin:top center;z-index:1;opacity:0;
    background:linear-gradient(180deg,rgba(233,201,143,.85),rgba(233,201,143,0));filter:blur(3px);}
  .reveal.show .beam{animation:beam .6s ease forwards;}
  @keyframes beam{0%{opacity:0;transform:translateX(-50%) scaleY(.2);}40%{opacity:1;}100%{opacity:0;transform:translateX(-50%) scaleY(1);}}
  .prize{position:relative;z-index:2;width:272px;max-width:100%;background:linear-gradient(180deg,#2a0813,#1c0610);
    border:1px solid rgba(212,168,108,.4);border-radius:18px;padding:22px 18px 18px;text-align:center;
    box-shadow:0 18px 44px rgba(0,0,0,.6);opacity:0;}
  .reveal.show .prize{animation:emerge .55s ease forwards;}
  @keyframes emerge{0%{transform:translateY(-150px) scale(.3);opacity:0;filter:blur(6px);}100%{transform:translateY(0) scale(1);opacity:1;filter:blur(0);}}
  .prize.jackpot{border-color:var(--rose);box-shadow:0 0 0 1px rgba(194,85,122,.4),0 0 40px rgba(194,85,122,.25),0 18px 44px rgba(0,0,0,.6);}
  .prize .turn-strip{margin:-22px -18px 12px;padding:8px 10px;font-family:Arial,sans-serif;font-size:10px;letter-spacing:.15em;text-transform:uppercase;
    background:linear-gradient(90deg,rgba(212,168,108,.15),rgba(233,201,143,.3),rgba(212,168,108,.15));border-bottom:1px solid rgba(233,201,143,.4);
    color:var(--cream);border-radius:18px 18px 0 0;display:flex;align-items:center;justify-content:center;gap:8px;}
  .prize .turn-strip .av{width:22px;height:22px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#3a1622,#1c0610);border:1px solid rgba(212,168,108,.55);display:flex;align-items:center;justify-content:center;font-size:14px;}
  .prize .won{font-family:Arial,sans-serif;font-size:10px;letter-spacing:.18em;color:var(--gold);text-transform:uppercase;margin:0 0 6px;}
  .prize .big{font-size:54px;margin:6px 0;font-family:'Segoe UI Emoji','Apple Color Emoji',sans-serif;}
  .prize .name{font-family:Georgia,serif;font-size:20px;color:var(--gold-soft);margin:4px 0 8px;}
  .prize .body{font-family:Arial,sans-serif;font-size:13px;color:#cbab9e;margin:0 0 14px;line-height:1.5;}
  .prize .btn{appearance:none;border:1px solid rgba(212,168,108,.45);cursor:pointer;font-family:Arial,sans-serif;
    min-height:42px;padding:0 18px;border-radius:10px;font-size:12px;letter-spacing:.1em;text-transform:uppercase;
    background:transparent;color:var(--gold-soft);}
  .prize .btn.gold{background:linear-gradient(180deg,var(--gold-soft),var(--gold));color:#2a0813;border-color:var(--gold);}

  .summary{max-width:340px;margin:22px auto 0;background:linear-gradient(180deg,#2a0813,#1c0610);border:1px solid rgba(194,85,122,.4);border-radius:14px;padding:14px 16px;font-family:Arial,sans-serif;font-size:12px;color:#cbab9e;line-height:1.5;display:none;}
  .summary.show{display:block;}
  .summary .ti{font-family:Georgia,serif;font-size:14px;color:var(--rose);margin-bottom:8px;letter-spacing:.04em;text-align:center;}
  .summary .pair{display:flex;align-items:center;gap:10px;margin:8px 0;padding:8px 10px;background:rgba(0,0,0,.25);border-radius:8px;}
  .summary .pair .av{width:30px;height:30px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#3a1622,#1c0610);border:1px solid rgba(212,168,108,.45);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
  .summary .pair .who{flex-shrink:0;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-soft);width:60px;}
  .summary .pair .prz{flex:1;display:flex;align-items:center;gap:8px;color:var(--cream);font-family:Georgia,serif;font-size:13px;}
  .summary .pair .prz .em{font-size:22px;}

  .resetbar{max-width:340px;margin:18px auto 0;text-align:center;}
  .resetbar button{appearance:none;cursor:pointer;font-family:Arial,sans-serif;font-size:10px;letter-spacing:.15em;text-transform:uppercase;
    background:transparent;border:1px solid rgba(212,168,108,.25);color:var(--muted);padding:8px 16px;border-radius:8px;}
</style>
</head>
<body>

<header>
  <h1>💎 Jackpot · sequenza</h1>
  <div class="sub">Tap "Avvia 💎 jackpot" e segui il flow: reveal jackpot → sub-spin 1 → sub-spin 2.</div>
</header>

<div class="steps-track">
  <div class="s" id="st0">0 · Setup</div>
  <div class="s" id="st1">1 · 💎 reveal</div>
  <div class="s" id="st2">2 · 🐻 spin</div>
  <div class="s" id="st3">3 · 🧁 spin</div>
</div>

<div class="wheel-wrap">
  <div class="pointer"></div>
  <div class="wheel" id="wheel"></div>
  <div class="winhi" id="winhi"></div>
  <div class="hub">💋</div>
</div>

<div class="turn-tag" id="turntag" style="display:none">
  <span class="av" id="turnav">🐻</span>
  <span id="turnname">Tomas tira</span>
</div>

<button class="ruota-spin solid" id="btnGo">AVVIA 💎 JACKPOT</button>

<div class="summary" id="summary">
  <div class="ti">💎 Jackpot — riepilogo</div>
  <div class="pair">
    <div class="av">🐻</div>
    <div class="who">Tomas</div>
    <div class="prz"><span class="em" id="sumEm1">·</span><span id="sumLbl1">—</span></div>
  </div>
  <div class="pair">
    <div class="av">🧁</div>
    <div class="who">morosa</div>
    <div class="prz"><span class="em" id="sumEm2">·</span><span id="sumLbl2">—</span></div>
  </div>
</div>

<div class="resetbar">
  <button id="btnReset">RICOMINCIA</button>
</div>

<!-- reveal overlay -->
<div class="reveal" id="reveal">
  <div class="stage">
    <div class="beam"></div>
    <div class="prize" id="prize">
      <div class="turn-strip" id="strip" style="display:none">
        <span class="av" id="stripAv">🐻</span>
        <span id="stripTxt">Premio di Tomas</span>
      </div>
      <p class="won" id="won">Hai vinto</p>
      <div class="big" id="prizeEm">·</div>
      <p class="name" id="prizeLbl">—</p>
      <p class="body" id="prizeBody"></p>
      <button class="btn gold" id="prizeNext">Avanti</button>
    </div>
  </div>
</div>

<script>
  const SET = [
    { e:'💋', k:'segreto',   l:'Apri un segreto',    sub:'Apri una busta segreta',                     w:1 },
    { e:'🔥', k:'piccante',  l:'Piccante',           sub:'Una proposta piccante da provare stasera',   w:1 },
    { e:'💌', k:'desiderio', l:'Pesca una fantasia', sub:'Dalla bacheca delle cose da provare',        w:1 },
    { e:'🧣', k:'bendare',   l:'Bendare',            sub:'Lasciati bendare — l\'altro/a decide quando finisce', w:1 },
    { e:'🃏', k:'wild',      l:'Carta wild',         sub:'L\'altro/a decide cosa farti per 24h',       w:1 },
    { e:'💆', k:'massaggio', l:'Massaggio',          sub:'10 minuti, dove preferisce chi ha vinto',    w:1 },
    { e:'🪄', k:'doppio',    l:'Prossimo ×2',        sub:'Il prossimo premio vale doppio',             w:0.5, rare:'rare' },
    { e:'📸', k:'polaroid',  l:'Foto osè 24h',       sub:'Inviane una al partner entro 24 ore',        w:1 },
    { e:'🎟️', k:'lampo',    l:'Buono lampo',        sub:'Un buono pescato a sorpresa, vale 24h',      w:1 },
    { e:'👅', k:'orale',     l:'Servizio orale',     sub:'Quando vuole chi ha vinto',                  w:1 },
    { e:'🔁', k:'ancora',    l:'Gira ancora',        sub:'Tiro extra concesso',                        w:1 },
    { e:'⭐', k:'jolly',     l:'Jolly',              sub:'Scegli tu il premio',                        w:1 },
    { e:'💎', k:'jackpot',   l:'Jackpot',            sub:'Uno spicchio a testa: 2 premi totali',       w:0.5, rare:'ultra' },
  ];

  const sumW = SET.reduce((s,x)=>s+x.w,0);
  const degPerUnit = 360 / sumW;
  const slice0 = SET[0].w * degPerUnit;
  const centers = [];
  let acc = 0;
  for (let i = 0; i < SET.length; i++) {
    const slice = SET[i].w * degPerUnit;
    centers.push(acc + slice/2 - slice0/2);
    acc += slice;
  }

  const wheelEl=document.getElementById('wheel');
  const winhiEl=document.getElementById('winhi');
  const reveal=document.getElementById('reveal');
  const prize=document.getElementById('prize');
  const prizeEm=document.getElementById('prizeEm');
  const prizeLbl=document.getElementById('prizeLbl');
  const prizeBody=document.getElementById('prizeBody');
  const prizeNext=document.getElementById('prizeNext');
  const won=document.getElementById('won');
  const strip=document.getElementById('strip');
  const stripAv=document.getElementById('stripAv');
  const stripTxt=document.getElementById('stripTxt');
  const turntag=document.getElementById('turntag');
  const turnav=document.getElementById('turnav');
  const turnname=document.getElementById('turnname');
  const btnGo=document.getElementById('btnGo');
  const btnReset=document.getElementById('btnReset');
  const summary=document.getElementById('summary');
  const sumEm1=document.getElementById('sumEm1');
  const sumLbl1=document.getElementById('sumLbl1');
  const sumEm2=document.getElementById('sumEm2');
  const sumLbl2=document.getElementById('sumLbl2');

  let rot=0,step=0,subResults=[];

  // build labels
  SET.forEach((f, i) => {
    const lbl = document.createElement('div'); lbl.className='slice-lbl';
    const inner = document.createElement('div'); inner.className='in';
    inner.style.transform = `rotate(${centers[i]}deg) translateY(-92px)`;
    const e = document.createElement('span');
    e.className = 'e' + (f.rare ? ' ' + f.rare : '');
    e.dataset.key = f.k;
    e.textContent = f.e;
    e.style.transform = `rotate(${-centers[i]}deg)`;
    inner.appendChild(e); lbl.appendChild(inner);
    wheelEl.appendChild(lbl);
  });

  function setStep(n) {
    step = n;
    ['st0','st1','st2','st3'].forEach((id,i) => {
      const el = document.getElementById(id);
      el.classList.toggle('cur', i === n);
      el.classList.toggle('done', i < n);
    });
  }

  function pickSubSpin() {
    // 💎 esclusa (peso 0 nei sub-spin)
    const sub = SET.map((f, i) => ({...f, idx:i})).filter(f => f.k !== 'jackpot');
    const w = sub.reduce((s,x) => s + x.w, 0);
    let r = Math.random() * w;
    for (const f of sub) { r -= f.w; if (r <= 0) return f; }
    return sub[0];
  }

  function dimJackpot(dim) {
    wheelEl.querySelectorAll('.slice-lbl .e[data-key="jackpot"]').forEach(e => {
      e.classList.toggle('dim', dim);
    });
  }

  function spinToIdx(idx) {
    return new Promise(resolve => {
      const center = centers[idx];
      const sliceWidth = SET[idx].w * degPerUnit;
      rot += 360 * 5 + ((360 - (rot % 360) - center) % 360 + 360) % 360;
      wheelEl.style.transform = `rotate(${rot}deg)`;
      wheelEl.querySelectorAll('.slice-lbl .e').forEach((e, i) => {
        e.style.transform = `rotate(${-centers[i] - rot}deg)`;
      });
      const half = sliceWidth / 2;
      winhiEl.style.background = `conic-gradient(from ${-half}deg, transparent 0 ${sliceWidth}deg, rgba(8,2,5,.74) ${sliceWidth}deg 360deg)`;
      setTimeout(() => { winhiEl.classList.add('on'); resolve(); }, 4300);
    });
  }

  function showReveal({ jackpot=false, turn=null, item }) {
    prize.classList.toggle('jackpot', jackpot);
    if (turn) {
      strip.style.display = '';
      stripAv.textContent = turn.av;
      stripTxt.textContent = `Premio di ${turn.name}`;
    } else {
      strip.style.display = 'none';
    }
    won.textContent = jackpot ? '🎉 Speciale' : 'Hai vinto';
    prizeEm.textContent = item.e;
    prizeLbl.textContent = item.l;
    prizeBody.textContent = item.sub;
    prizeNext.textContent = jackpot ? 'Vediamo i premi' : 'Avanti';
    reveal.classList.add('show');
  }

  function closeReveal() {
    reveal.classList.remove('show');
    winhiEl.classList.remove('on');
  }

  async function run() {
    if (step !== 0) return;
    btnGo.disabled = true;
    setStep(1);

    // 1. spin alla 💎
    const jackIdx = SET.findIndex(f => f.k === 'jackpot');
    await spinToIdx(jackIdx);
    showReveal({ jackpot:true, item: SET[jackIdx] });
  }

  prizeNext.onclick = async () => {
    closeReveal();
    if (step === 1) {
      // step 2: sub-spin 1 (Tomas)
      setStep(2);
      dimJackpot(true);
      turntag.style.display = '';
      turnav.textContent = '🐻';
      turnname.textContent = 'Tomas tira';
      await new Promise(r => setTimeout(r, 600));
      const pick = pickSubSpin();
      subResults[0] = pick;
      await spinToIdx(pick.idx);
      showReveal({ turn:{av:'🐻',name:'Tomas'}, item: pick });
    } else if (step === 2) {
      // step 3: sub-spin 2 (morosa)
      setStep(3);
      turnav.textContent = '🧁';
      turnname.textContent = 'morosa tira';
      await new Promise(r => setTimeout(r, 600));
      const pick = pickSubSpin();
      subResults[1] = pick;
      await spinToIdx(pick.idx);
      showReveal({ turn:{av:'🧁',name:'morosa'}, item: pick });
    } else if (step === 3) {
      // end: show summary
      setStep(0);
      turntag.style.display = 'none';
      dimJackpot(false);
      sumEm1.textContent = subResults[0].e;
      sumLbl1.textContent = subResults[0].l;
      sumEm2.textContent = subResults[1].e;
      sumLbl2.textContent = subResults[1].l;
      summary.classList.add('show');
    }
  };

  btnReset.onclick = () => {
    summary.classList.remove('show');
    btnGo.disabled = false;
    setStep(0);
    rot = 0;
    wheelEl.style.transition = 'none';
    wheelEl.style.transform = 'rotate(0deg)';
    wheelEl.querySelectorAll('.slice-lbl .e').forEach((e, i) => {
      e.style.transform = `rotate(${-centers[i]}deg)`;
    });
    setTimeout(() => { wheelEl.style.transition = ''; }, 50);
    dimJackpot(false);
    turntag.style.display = 'none';
    subResults = [];
  };

  btnGo.onclick = run;
  setStep(0);
</script>
</body>
</html>
